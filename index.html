<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Fut PRO</title>
    <style>
        :root { --neon: #00ff88; --dark: #000; --card: #1a1a1a; --border: #333; --blue: #007bff; --red: #dc3545; --gold: #ffcc00; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; padding-bottom: 80px; }
        
        button { border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-neon { background: var(--neon); color: #000; padding: 15px; width: 100%; }
        .btn-vitoria { padding: 18px 10px; font-size: 13px; color: white; flex: 1; }
        .btn-empate { background: #333; color: #fff; padding: 12px; width: 100%; margin-top: 8px; }
        .btn-voltar { background: transparent; color: #888; border: 1px solid #444; padding: 8px 15px; margin-bottom: 10px; font-size: 11px; width: fit-content; }
        
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }

        /* LISTAS TELA 2 */
        .section-title { font-size: 10px; font-weight: 900; color: #888; letter-spacing: 1px; margin: 15px 0 8px 5px; text-transform: uppercase; }
        .container-confirmados { background: rgba(0, 255, 136, 0.03); border-radius: 12px; padding: 5px; border: 1px solid #222; }
        .container-espera { background: rgba(255, 68, 68, 0.03); border-radius: 12px; padding: 5px; border: 1px dashed #442222; }
        .atleta-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #333; }

        /* PLACAR E LOGS TELA 3 */
        .placar-box { font-size: 55px; font-weight: 900; text-align: center; display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0; }
        .log-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .log-individual { flex: 1; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 8px; border: 1px solid #222; min-height: 80px; max-height: 120px; overflow-y: auto; }
        .log-entry { font-size: 10px; margin-bottom: 6px; border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; line-height: 1.2; }
        .log-time { color: var(--gold); font-weight: bold; margin-right: 4px; }
        .log-assist { color: #888; font-size: 9px; display: block; margin-top: 1px; }

        /* FILA E RANKING */
        .fila-container { background: #111; padding: 12px; border-radius: 12px; border: 1px solid #333; margin: 15px 0; }
        .proximo-time-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 8px; border-left: 3px solid var(--neon); }
        .tag-jogador { display: inline-block; background: #222; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin: 2px; color: #fff; }
        
        .rank-container { background: #0a0a0a; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .rank-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .rank-table th { background: #111; color: #666; font-size: 9px; text-transform: uppercase; padding: 10px 5px; border-bottom: 1px solid #222; }
        .rank-table td { padding: 12px 5px; border-bottom: 1px solid #1a1a1a; text-align: center; }
        .col-atleta { text-align: left !important; padding-left: 10px !important; font-weight: bold; }
        .pos-top { font-weight: 900; color: var(--neon); width: 30px; }

        /* ESTILOS TELA 4 (INSTAGRAM CARD) */
        .insta-card { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border: 2px solid var(--neon); border-radius: 20px; padding: 20px; text-align: center; }
        .insta-header { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .insta-header h2 { color: var(--neon); margin: 0; font-size: 24px; text-transform: uppercase; }
        .highlights-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        .highlight-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; border-left: 4px solid var(--neon); display: flex; align-items: center; justify-content: space-between; }
        .highlight-info { text-align: left; }
        .highlight-label { font-size: 9px; color: var(--neon); text-transform: uppercase; font-weight: 900; }
        .highlight-name { font-size: 16px; font-weight: bold; color: #fff; }
        .highlight-stat { background: var(--neon); color: #000; padding: 2px 8px; border-radius: 5px; font-weight: 900; font-size: 12px; }
        .final-stats-bar { display: flex; justify-content: space-around; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .stat-box { text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: 900; color: var(--gold); }
        .stat-desc { font-size: 9px; color: #888; text-transform: uppercase; }
        .rank-final-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #222; font-size: 12px; }

        input, textarea, select { width: 100%; padding: 12px; margin: 6px 0; border-radius: 12px; border: 1px solid var(--border); background: #111; color: #fff; box-sizing: border-box; }
        @keyframes blink { 50% { opacity: 0.5; color: #ff0000; } }
        .tempo-acabando { animation: blink 1s infinite; color: #ff4444 !important; }
    </style>
</head>
<body>

<div id="tela1" class="card">
    <h2>Arena Fut PRO</h2>
    <input id="nomeEvento" placeholder="Nome da Pelada">
    <input id="local" placeholder="Local/Arena">
    <div style="display:flex; gap:10px">
        <input id="dataEv" type="date">
        <select id="tipoCampo"><option>Society</option><option>Futsal</option><option>Campo</option></select>
    </div>
    <div style="display:flex; gap:10px">
        <input id="limite" type="number" placeholder="Total Atletas">
        <input id="jogadoresPorTime" type="number" placeholder="Atletas/Time">
    </div>
    <input id="tempoRegra" type="number" value="10">
    <button class="btn-neon" onclick="irTela2()">Próximo: Lista →</button>
</div>

<div id="tela2" style="display:none">
    <button class="btn-voltar" onclick="voltarPara(1)">← Voltar</button>
    <div class="card">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <div style="flex:1; text-align:center; background:#0a0a0a; padding:12px; border-radius:12px; border: 1px solid #222">
                <span id="countConf" style="color:var(--neon); font-size:22px; font-weight:bold">0</span><br><small style="color: #666">CONFIRMADOS</small>
            </div>
            <div style="flex:1; text-align:center; background:#0a0a0a; padding:12px; border-radius:12px; border: 1px solid #222">
                <span id="countEsp" style="color:var(--red); font-size:22px; font-weight:bold">0</span><br><small style="color: #666">EM ESPERA</small>
            </div>
        </div>
        <textarea id="listaTexto" rows="3" placeholder="Cole a lista de atletas aqui..."></textarea>
        <button style="background:#333; color:#fff; padding:12px; width:100%; margin-bottom:15px" onclick="processarLista()">Carregar Lista</button>
        <div id="areaCheckin" style="display:none">
            <div style="display:flex; gap:8px; margin-bottom:15px">
                <button style="flex:1; padding:10px; font-size:10px; background: #222; color: #fff; border: 1px solid #444" onclick="marcarTodos(true)">✅ Todos</button>
                <button style="flex:1; padding:10px; font-size:10px; background: #222; color: #fff; border: 1px solid #444" onclick="marcarTodos(false)">❌ Limpar</button>
            </div>
            <div class="section-title">✓ Confirmados</div>
            <div id="listaConfirmados" class="container-confirmados"></div>
            <div id="secaoEspera" style="display:none">
                <div class="section-title" style="color: var(--red)">⚠ Espera</div>
                <div id="corpoEspera" class="container-espera"></div>
            </div>
        </div>
        <div style="height: 80px;"></div>
        <button id="btnIniciar" class="btn-neon" style="position:fixed; bottom:15px; left:15px; right:15px; width:calc(100% - 30px); z-index:100;" onclick="iniciar()">Iniciar Partida</button>
    </div>
</div>

<div id="tela3" style="display:none">
    <button class="btn-voltar" onclick="voltarPara(2)">← Voltar</button>
    <div class="card" style="margin-bottom:10px; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);">
        <div id="cronometro" style="font-size:40px; text-align:center; color:var(--gold); font-weight: 900;">00:00</div>
        <div class="placar-box"><span id="pA" style="color:var(--blue)">0</span><span style="font-size:20px; color:#333">VS</span><span id="pB" style="color:var(--red)">0</span></div>
        <div class="log-container">
            <div id="logAzul" class="log-individual"></div>
            <div id="logRed" class="log-individual"></div>
        </div>
        <button style="background:var(--gold); color:#000; width:100%; padding:12px" onclick="toggleCronometro()">PLAY / PAUSE</button>
    </div>
    <div style="display:flex; gap:8px">
        <div class="card" style="flex:1; border-top:4px solid var(--blue); padding:10px"><div id="jogA"></div></div>
        <div class="card" style="flex:1; border-top:4px solid var(--red); padding:10px"><div id="jogB"></div></div>
    </div>
    <div style="display:flex; gap:8px">
        <button class="btn-vitoria" style="background:var(--blue)" onclick="vitoria(0)">AZUL VENCEU</button>
        <button class="btn-vitoria" style="background:var(--red)" onclick="vitoria(1)">RED VENCEU</button>
    </div>
    <button class="btn-empate" onclick="vitoria(-1)">EMPATE / PRÓXIMOS</button>
    <div class="fila-container"><div id="listaFilaProjetada"></div></div>
    <div class="card">
        <h3 style="margin: 0 0 10px 0; font-size: 14px; text-align: center; color: var(--gold)">🏆 CLASSIFICAÇÃO</h3>
        <div class="rank-container">
            <table class="rank-table">
                <thead><tr><th>#</th><th class="col-atleta">Atleta</th><th>V</th><th>G</th><th>A</th></tr></thead>
                <tbody id="corpoRank"></tbody>
            </table>
        </div>
        <button style="background:#ff4444; color:white; margin-top:25px; width:100%; padding:15px" onclick="finalizarPelada()">FINALIZAR EVENTO 🏁</button>
    </div>
</div>

<div id="tela4" style="display:none">
    <button class="btn-voltar" onclick="voltarPara(3)">← Voltar</button>
    <div id="capture-area" class="insta-card">
        <div class="insta-header">
            <h2 id="resumoTitulo">ARENA FUT PRO</h2>
            <p id="resumoSubtitulo">RESULTADOS DA PELADA</p>
        </div>
        <div class="final-stats-bar">
            <div class="stat-box"><span class="stat-val" id="resumoGols">0</span><span class="stat-desc">Gols</span></div>
            <div class="stat-box"><span class="stat-val" id="resumoPartidas">0</span><span class="stat-desc">Partidas</span></div>
            <div class="stat-box"><span class="stat-val" id="resumoData">--/--</span><span class="stat-desc">Data</span></div>
        </div>
        <div class="highlights-grid">
            <div class="highlight-item" style="border-left-color: var(--gold)">
                <div class="highlight-info"><span class="highlight-label">🏆 MVP</span><div class="highlight-name" id="bestMVP">-</div></div>
                <span class="highlight-stat" id="valMVP">0V</span>
            </div>
            <div class="highlight-item" style="border-left-color: #ff4444">
                <div class="highlight-info"><span class="highlight-label">⚽ Artilheiro</span><div class="highlight-name" id="bestArt">-</div></div>
                <span class="highlight-stat" id="valArt">0G</span>
            </div>
            <div class="highlight-item" style="border-left-color: var(--blue)">
                <div class="highlight-info"><span class="highlight-label">👟 Garçom</span><div class="highlight-name" id="bestGar">-</div></div>
                <span class="highlight-stat" id="valGar">0A</span>
            </div>
        </div>
        <div id="listaFinalRank"></div>
        <div style="margin-top: 20px; font-size: 9px; color: #444;">Gerado por Arena Fut PRO</div>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px">
        <button style="background:#25D366; color:white; padding:15px" onclick="compartilharZap()">WhatsApp 💬</button>
        <button style="background:var(--blue); color:white; padding:15px" onclick="copiarTexto()">Copiar Texto 📋</button>
    </div>
    <p style="text-align:center; font-size: 11px; color: #888; margin-top: 10px;">📸 Tire um print para postar!</p>
</div>

<div id="modalAssist" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:200; align-items:center; justify-content:center; padding:20px">
    <div class="card" style="width:100%; max-width:300px; text-align:center">
        <h3>👟 Assistência de:</h3>
        <div id="botoesAssist"></div>
        <button style="background:#444; color:#fff; margin-top:15px; width:100%; padding:10px" onclick="confirmarGol(null)">GOL INDIVIDUAL</button>
    </div>
</div>

<script>
let app = {
    nomes: [], fila: [], atual: [[], []], ranking: {},
    tempoSegundos: 0, interval: null, rodando: false,
    logsPartida: [], totalPartidas: 0, pendente: null, totalGols: 0, textoRelatorio: ""
};

function irTela2() { document.getElementById("tela1").style.display="none"; document.getElementById("tela2").style.display="block"; }
function voltarPara(tela) { document.querySelectorAll('body > div').forEach(d => d.style.display="none"); document.getElementById("tela" + tela).style.display="block"; }

function processarLista() {
    let t = document.getElementById("listaTexto").value;
    let ns = t.split("\n").map(n => n.replace(/^\d+[\s.-]*/, '').trim()).filter(n => n !== "");
    app.nomes = ns.map(n => ({ nome: n, conf: true }));
    document.getElementById("areaCheckin").style.display = "block";
    renderCheckin();
}

function marcarTodos(val) { app.nomes.forEach(p => p.conf = val); renderCheckin(); }

function renderCheckin() {
    let hC = "", hE = "", lim = parseInt(document.getElementById("limite").value) || 99, c = 0, e = 0;
    app.nomes.forEach((p, i) => {
        let item = `<div class="atleta-item"><div><b>${p.nome}</b></div><input type="checkbox" ${p.conf?'checked':''} style="width:22px; height:22px" onchange="app.nomes[${i}].conf=this.checked; renderCheckin()"></div>`;
        if (c < lim) { hC += item; if(p.conf) c++; } else { hE += item; if(p.conf) e++; }
    });
    document.getElementById("countConf").innerText = c;
    document.getElementById("countEsp").innerText = e;
    document.getElementById("listaConfirmados").innerHTML = hC || '<div style="padding:10px; color:#444; text-align:center">Vazio</div>';
    document.getElementById("corpoEspera").innerHTML = hE;
    document.getElementById("secaoEspera").style.display = hE ? "block" : "none";
}

function iniciar() {
    let ativos = app.nomes.filter(x=>x.conf);
    ativos.forEach(p => app.ranking[p.nome] = { v: 0, g: 0, a: 0 });
    app.fila = ativos.map(p => p.nome).sort(() => Math.random() - 0.5);
    app.tempoSegundos = (parseInt(document.getElementById("tempoRegra").value) || 10) * 60;
    let qtd = parseInt(document.getElementById("jogadoresPorTime").value);
    app.atual[0] = app.fila.splice(0, qtd); app.atual[1] = app.fila.splice(0, qtd);
    voltarPara(3);
    atuCronometroUI(); atuUI();
}

function atuUI() {
    const renderJ = (idx, div) => {
        document.getElementById(div).innerHTML = app.atual[idx].map(n => `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; background:rgba(255,255,255,0.05); padding:5px 8px; border-radius:8px"><span style="font-size:11px; font-weight:bold">${n}</span><button style="background:var(--neon); color:#000; font-size:9px; padding:4px 8px" onclick="preGol(${idx}, '${n}')">GOL</button></div>`).join('');
    };
    renderJ(0, "jogA"); renderJ(1, "jogB");
    const rLog = (t, div) => {
        let logs = app.logsPartida.filter(l => l.partida === app.totalPartidas + 1 && l.time === t);
        document.getElementById(div).innerHTML = logs.map(l => `<div class="log-entry"><span class="log-time">${l.min}'</span> ⚽ <b>${l.autor}</b>${l.ass ? `<span class="log-assist">👟 Ass: ${l.ass}</span>` : ''}</div>`).reverse().join('') || '<div style="color:#333; font-size:9px; text-align:center; padding-top:20px">...</div>';
    };
    rLog('Azul', 'logAzul'); rLog('Vermelho', 'logRed');
    
    let sort = Object.entries(app.ranking).sort((a,b) => b[1].v - a[1].v || b[1].g - a[1].g || b[1].a - a[1].a);
    document.getElementById("corpoRank").innerHTML = sort.map(([n, s], i) => {
        let icon = (i+1)===1?"🥇":(i+1)===2?"🥈":(i+1)===3?"🥉":i+1;
        return `<tr><td class="pos-top">${icon}</td><td class="col-atleta">${n}</td><td>${s.v}</td><td>${s.g}</td><td>${s.a}</td></tr>`;
    }).join('');

    let qtd = parseInt(document.getElementById("jogadoresPorTime").value);
    let htmlF = "";
    for (let i = 0; i < app.fila.length; i += qtd) {
        let t = app.fila.slice(i, i + qtd);
        htmlF += `<div class="proximo-time-box"><small style="color:#666; font-size:9px">TIME ${Math.floor(i/qtd) + 1}</small><br>${t.map(n => `<span class="tag-jogador">${n}</span>`).join('')}</div>`;
    }
    document.getElementById("listaFilaProjetada").innerHTML = htmlF;
}

function preGol(tIdx, nome) {
    app.pendente = { tIdx, nome };
    let cor = tIdx === 0 ? 'var(--blue)' : 'var(--red)';
    document.getElementById("botoesAssist").innerHTML = app.atual[tIdx].filter(x => x !== nome).map(n => `<button style="background:${cor}; color:#fff; padding:12px; margin:4px 0; width:100%" onclick="confirmarGol('${n}')">${n}</button>`).join('');
    document.getElementById("modalAssist").style.display = "flex";
}

function confirmarGol(ass) {
    let { tIdx, nome } = app.pendente;
    let decorrido = ((parseInt(document.getElementById("tempoRegra").value) || 10) * 60) - app.tempoSegundos;
    let min = Math.floor(decorrido / 60);
    app.ranking[nome].g++; app.totalGols++;
    if(ass) app.ranking[ass].a++;
    app.logsPartida.push({ min: min < 0 ? 0 : min, autor: nome, ass, time: tIdx === 0 ? 'Azul' : 'Vermelho', partida: app.totalPartidas + 1 });
    document.getElementById(tIdx === 0 ? "pA" : "pB").innerText = parseInt(document.getElementById(tIdx === 0 ? "pA" : "pB").innerText) + 1;
    document.getElementById("modalAssist").style.display = "none";
    atuUI();
}

function atuCronometroUI() {
    let m = Math.floor(Math.abs(app.tempoSegundos)/60).toString().padStart(2,'0');
    let s = (Math.abs(app.tempoSegundos)%60).toString().padStart(2,'0');
    let d = document.getElementById("cronometro");
    d.innerText = (app.tempoSegundos < 0 ? "-" : "") + `${m}:${s}`;
    if(app.tempoSegundos <= 0) d.classList.add("tempo-acabando"); else d.classList.remove("tempo-acabando");
}

function toggleCronometro() { if(app.rodando) clearInterval(app.interval); else app.interval = setInterval(() => { app.tempoSegundos--; atuCronometroUI(); }, 1000); app.rodando = !app.rodando; }

function vitoria(vIdx) {
    app.totalPartidas++;
    if(vIdx !== -1) app.atual[vIdx].forEach(n => app.ranking[n].v++);
    let saem = vIdx === -1 ? [...app.atual[0], ...app.atual[1]] : [...app.atual[vIdx === 0 ? 1 : 0]];
    app.fila.push(...saem);
    let qtd = parseInt(document.getElementById("jogadoresPorTime").value);
    if(vIdx === -1) { app.atual[0] = app.fila.splice(0, qtd); app.atual[1] = app.fila.splice(0, qtd); } else { app.atual[vIdx === 0 ? 1 : 0] = app.fila.splice(0, qtd); }
    document.getElementById("pA").innerText = "0"; document.getElementById("pB").innerText = "0";
    app.tempoSegundos = (parseInt(document.getElementById("tempoRegra").value) || 10) * 60;
    clearInterval(app.interval); app.rodando = false; atuCronometroUI(); atuUI();
}

function finalizarPelada() {
    voltarPara(4);
    document.getElementById("resumoTitulo").innerText = document.getElementById("nomeEvento").value || "ARENA FUT PRO";
    document.getElementById("resumoGols").innerText = app.totalGols;
    document.getElementById("resumoPartidas").innerText = app.totalPartidas;
    let data = document.getElementById("dataEv").value;
    if(data) document.getElementById("resumoData").innerText = new Date(data).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});

    let r = Object.entries(app.ranking);
    let mvp = [...r].sort((a,b) => b[1].v - a[1].v || b[1].g - a[1].g || b[1].a - a[1].a)[0];
    let art = [...r].sort((a,b) => b[1].g - a[1].g || b[1].v - a[1].v)[0];
    let gar = [...r].sort((a,b) => b[1].a - a[1].a || b[1].v - a[1].v)[0];

    document.getElementById("bestMVP").innerText = mvp ? mvp[0] : "-";
    document.getElementById("valMVP").innerText = mvp ? mvp[1].v + "V" : "0V";
    document.getElementById("bestArt").innerText = art ? art[0] : "-";
    document.getElementById("valArt").innerText = art ? art[1].g + "G" : "0G";
    document.getElementById("bestGar").innerText = gar ? gar[0] : "-";
    document.getElementById("valGar").innerText = gar ? gar[1].a + "A" : "0A";

    let sortRank = [...r].sort((a,b) => b[1].v - a[1].v || b[1].g - a[1].g || b[1].a - a[1].a);
    document.getElementById("listaFinalRank").innerHTML = sortRank.slice(0, 5).map(([n, s], i) => `<div class="rank-final-row"><span>#${i+1} <b>${n}</b></span><span style="color:var(--neon)">${s.v}V - ${s.g}G - ${s.a}A</span></div>`).join('');

    app.textoRelatorio = `*📊 ${document.getElementById("nomeEvento").value || "RESUMO DA PELADA"}*\n\n⚽ Gols: ${app.totalGols}\n⚔️ Partidas: ${app.totalPartidas}\n\n🏆 MVP: *${mvp?mvp[0]:'-'}*\n🔥 Artilheiro: *${art?art[0]:'-'}* (${art?art[1].g:0})\n👟 Garçom: *${gar?gar[0]:'-'}* (${gar?gar[1].a:0})`;
}

function compartilharZap() { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(app.textoRelatorio)}`); }
function copiarTexto() { navigator.clipboard.writeText(app.textoRelatorio); alert("Texto copiado!"); }
</script>
</body>
</html>
