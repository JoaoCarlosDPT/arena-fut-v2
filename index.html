<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENA FUT PRO V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --primary-color: #d4ff00; /* Verde Neon */
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            text-align: center;
            padding: 40px;
            width: 85%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }

        .logo h1 {
            font-size: 2.8rem;
            font-style: italic;
            font-weight: 900;
            margin-bottom: 0;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary-color);
        }

        .tagline {
            color: #888;
            font-size: 0.95rem;
            margin-top: 10px;
            margin-bottom: 40px;
        }

        .btn-google {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.2s;
        }

        .btn-google:active {
            transform: scale(0.96);
        }

        #status-msg {
            margin-top: 20px;
            font-size: 0.85rem;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <h1>ARENA<span>FUT</span></h1>
            <div style="font-weight: bold; letter-spacing: 3px; color: var(--primary-color); font-size: 0.8rem;">PRO V2</div>
        </div>
        
        <p class="tagline">Sua pelada levada a sério.</p>

        <button class="btn-google" onclick="handleLogin()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.344-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/></svg>
            Entrar com Google
        </button>

        <div id="status-msg"></div>
    </div>

    <script>
        // CONFIGURAÇÃO ATUALIZADA
        const firebaseConfig = {
            apiKey: "AIzaSyCwi7wNRm-0Zg8W1sXVOFy-1EnGHjXyUCg",
            authDomain: "arena-fut-f1599.firebaseapp.com",
            projectId: "arena-fut-f1599",
            storageBucket: "arena-fut-f1599.firebasestorage.app",
            messagingSenderId: "835218567459",
            appId: "1:835218567459:web:8ff9a673cc523f6e7b9c96",
            measurementId: "G-LTT2WMZ0LF"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);

        function handleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const msg = document.getElementById('status-msg');
            
            msg.style.color = "#888";
            msg.innerText = "Conectando ao Google...";

            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    msg.style.color = "#d4ff00";
                    msg.innerText = "Bem-vindo, " + result.user.displayName;
                    
                    setTimeout(() => {
                        alert("Sucesso! Próxima parada: Gestão da Pelada.");
                    }, 500);
                })
                .catch((error) => {
                    msg.style.color = "#ff4444";
                    msg.innerText = "Erro: " + error.message;
                    console.error("Erro no Login:", error);
                });
        }
    </script>
</body>
</html>
