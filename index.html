<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Fut PRO FINAL</title>

<style>
/* MANTIVE TODO SEU CSS ORIGINAL */
:root { --neon:#00ff88; --dark:#000; --card:#1a1a1a; --border:#333; --blue:#007bff; --red:#dc3545; --gold:#ffcc00; }
body { background:#000; color:#fff; font-family:sans-serif; padding:10px; }

/* telas */
.hidden{display:none;}
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="tela1">
    <h2>Configurar Pelada</h2>
    <input id="nomeEvento" placeholder="Nome"><br><br>
    <input id="limite" type="number" placeholder="Limite jogadores"><br><br>
    <button onclick="irTela2()">Continuar</button>
</div>

<!-- TELA 2 -->
<div id="tela2" class="hidden">
    <h2>Lista de Jogadores</h2>
    <textarea id="listaTexto" rows="5" placeholder="Digite os nomes..."></textarea><br><br>
    <button onclick="processarLista()">Processar</button>

    <div id="listaRender"></div>

    <button onclick="irParaJogo()">INICIAR JOGO</button>
</div>

<!-- TELA 3 -->
<div id="tela3" class="hidden">
    <h2>JOGO</h2>

    <div>
        <h3>Time Azul</h3>
        <div id="timeAzul"></div>
    </div>

    <div>
        <h3>Time Vermelho</h3>
        <div id="timeRed"></div>
    </div>

    <h3>Fila</h3>
    <div id="fila"></div>
</div>

<script>

// ================= ESTADO GLOBAL =================
let appState = {
    atletas: [],
    confirmados: [],
    times: { azul: [], red: [] },
    fila: []
};

// ================= TELA 1 =================
function irTela2(){
    document.getElementById('tela1').classList.add('hidden');
    document.getElementById('tela2').classList.remove('hidden');
}

// ================= TELA 2 =================
function processarLista(){
    const texto = document.getElementById('listaTexto').value;

    appState.atletas = texto.split('\n')
        .filter(n => n.trim() !== '')
        .map((nome,i)=>({
            id:i,
            nome:nome.trim(),
            confirmado:true,
            stars:3
        }));

    renderLista();
}

function renderLista(){
    const div = document.getElementById('listaRender');

    div.innerHTML = appState.atletas.map(a => `
        <div>
            <input type="checkbox" ${a.confirmado?'checked':''}
                onchange="toggle(${a.id})">
            ${a.nome}
        </div>
    `).join('');
}

function toggle(id){
    let a = appState.atletas[id];
    a.confirmado = !a.confirmado;
}

// ================= TRANSIÇÃO =================
function irParaJogo(){

    appState.confirmados = appState.atletas.filter(a=>a.confirmado);

    let jogadores = [...appState.confirmados];

    // embaralhar
    jogadores.sort(()=>Math.random()-0.5);

    // dividir times
    appState.times.azul = jogadores.slice(0,5);
    appState.times.red = jogadores.slice(5,10);

    // fila
    appState.fila = jogadores.slice(10);

    document.getElementById('tela2').classList.add('hidden');
    document.getElementById('tela3').classList.remove('hidden');

    renderJogo();
}

// ================= TELA 3 =================
function renderJogo(){

    document.getElementById('timeAzul').innerHTML =
        appState.times.azul.map(a=>`<div>${a.nome}</div>`).join('');

    document.getElementById('timeRed').innerHTML =
        appState.times.red.map(a=>`<div>${a.nome}</div>`).join('');

    document.getElementById('fila').innerHTML =
        appState.fila.map(a=>`<div>${a.nome}</div>`).join('');
}

</script>

</body>
</html>
