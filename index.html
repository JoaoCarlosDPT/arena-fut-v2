<div id="tela3" class="hidden">
    <style>
        .timer-container { text-align: center; padding: 20px 0; }
        .timer-display { font-size: 64px; font-weight: bold; color: var(--gold); text-shadow: 0 0 20px rgba(255, 204, 0, 0.4); font-family: 'Courier New', Courier, monospace; }
        .timer-controls { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .btn-timer { background: #222; color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #333; }
        
        .progress-container { width: 80%; margin: 15px auto; height: 8px; background: #222; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--neon); width: 100%; transition: width 1s linear; box-shadow: 0 0 10px var(--neon); }

        .placar-container { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; }
        .placar-box { width: 80px; height: 80px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; background: #111; border-width: 2px; border-style: solid; }
        .placar-azul { border-color: var(--blue); color: var(--blue); box-shadow: inset 0 0 15px rgba(0, 123, 255, 0.3); }
        .placar-red { border-color: var(--red); color: var(--red); box-shadow: inset 0 0 15px rgba(220, 53, 69, 0.3); }

        .field-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .team-card { background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .team-header { padding: 8px; text-align: center; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .header-azul { background: var(--blue); color: #fff; }
        .header-red { background: var(--red); color: #fff; }
        
        .player-row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 12px; gap: 5px; }
        .player-info { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pos-indicator { color: var(--gold); font-weight: bold; font-size: 10px; }
        .btn-action { background: #222; border: 1px solid #333; color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 9px; font-weight: bold; cursor: pointer; }
        .btn-gol { border-color: var(--neon); color: var(--neon); }

        .timeline-section { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
        .log-entry { font-size: 11px; margin-bottom: 5px; color: #aaa; border-left: 2px solid #333; padding-left: 8px; }
        .log-entry b { color: #fff; }

        .next-up-card { background: rgba(0, 255, 136, 0.05); border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .next-info { font-size: 11px; color: var(--neon); font-weight: bold; }
        .next-names { font-size: 10px; color: #888; display: block; margin-top: 3px; }

        .btn-finish-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-outcome { padding: 12px 5px; font-size: 10px; border: 1px solid #333; background: #111; color: #fff; }
        
        /* Modal Assistência */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 400px; border-radius: 20px; border: 1px solid var(--neon); padding: 20px; }
        .assist-option { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 8px; text-align: center; font-weight: bold; border: 1px solid #333; }
    </style>

    <div class="timer-container">
        <div class="timer-display" id="clock">10:00</div>
        <div class="timer-controls">
            <button class="btn-timer" onclick="toggleTimer()">▶</button>
            <button class="btn-timer" onclick="resetTimer()">↺</button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="timerBar"></div></div>
    </div>

    <div class="placar-container">
        <div class="placar-box placar-azul" id="scoreAzul">0</div>
        <div class="placar-box placar-red" id="scoreRed">0</div>
    </div>

    <div class="field-panel">
        <div class="team-card">
            <div class="team-header header-azul">TIME AZUL</div>
            <div id="playersAzul"></div>
        </div>
        <div class="team-card">
            <div class="team-header header-red">TIME RED</div>
            <div id="playersRed"></div>
        </div>
    </div>

    <div class="timeline-section">
        <div style="font-size: 10px; font-weight: 900; color: #444; margin-bottom: 10px; letter-spacing: 1px;">TIMELINE / LOG</div>
        <div id="gameLog"></div>
    </div>

    <div class="next-up-card">
        <div style="flex:1">
            <span class="next-info">PRÓXIMO TIME (FILA)</span>
            <span class="next-names" id="txtProximoTime">Aguardando definição...</span>
        </div>
        <button class="btn-action" style="border-color: var(--gold); color: var(--gold);" onclick="abrirEdicaoFila()">EDITAR FILA 📝</button>
    </div>

    <div class="card" style="padding: 10px; display: flex; gap: 10px;">
        <input type="text" id="nomeAtrasado" placeholder="Adicionar retardatário..." style="height: 40px; font-size: 12px;">
        <button class="btn-neon" style="width: 50px; padding: 0;" onclick="addRetardatario()">+</button>
    </div>

    <div class="btn-finish-row">
        <button class="btn-outcome" style="color: var(--blue); border-color: var(--blue);" onclick="finalizarPartida('azul')">VITÓRIA<br>AZUL</button>
        <button class="btn-outcome" style="color: var(--red); border-color: var(--red);" onclick="finalizarPartida('red')">VITÓRIA<br>RED</button>
        <button class="btn-outcome" onclick="finalizarPartida('empate')">EMPATE</button>
    </div>
</div>

<div id="modalAssist" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--neon); text-align: center; margin-top: 0;">Quem deu o passe? 👟</h3>
        <div id="assistOptions"></div>
        <div class="assist-option" style="color: #666;" onclick="registrarGol(null)">GOL INDIVIDUAL / SEM ASSIST.</div>
    </div>
</div>

<script>
    // Variáveis de Estado da Tela 3
    let tempoRestante = 600; // 10 min padrão
    let timerRunning = false;
    let timerInterval;
    let score = { azul: 0, red: 0 };
    let autorGolAtual = null;
    let timeGolAtual = null;

    function toggleTimer() {
        if(timerRunning) {
            clearInterval(timerInterval);
            timerRunning = false;
        } else {
            timerInterval = setInterval(updateTimer, 1000);
            timerRunning = true;
        }
    }

    function updateTimer() {
        if(tempoRestante <= 0) {
            clearInterval(timerInterval);
            alert("Fim de partida!");
            return;
        }
        tempoRestante--;
        const mins = Math.floor(tempoRestante / 60);
        const secs = tempoRestante % 60;
        document.getElementById('clock').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        
        const total = (parseInt(document.getElementById('tempoRegra').value) || 10) * 60;
        const perc = (tempoRestante / total) * 100;
        document.getElementById('timerBar').style.width = perc + '%';
    }

    function abrirModalGol(atletaId, time) {
        autorGolAtual = atletaId;
        timeGolAtual = time;
        const timeAtletas = atletasApp.filter(a => a.confirmado && (a.time === time) && a.id !== atletaId);
        
        const container = document.getElementById('assistOptions');
        container.innerHTML = timeAtletas.map(a => `
            <div class="assist-option" onclick="registrarGol(${a.id})">${a.nome}</div>
        `).join('');
        
        document.getElementById('modalAssist').style.display = 'flex';
    }

    function registrarGol(assistId) {
        score[timeGolAtual]++;
        document.getElementById(`score${timeGolAtual.charAt(0).toUpperCase() + timeGolAtual.slice(1)}`).innerText = score[timeGolAtual];
        
        const autor = atletasApp.find(a => a.id === autorGolAtual);
        const assist = assistId !== null ? atletasApp.find(a => a.id === assistId) : null;
        
        const log = document.getElementById('gameLog');
        const timeLabel = document.getElementById('clock').innerText;
        
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `[${timeLabel}] ⚽ <b>${autor.nome}</b> ${assist ? `<br>👟 Assist: ${assist.nome}` : ''}`;
        log.prepend(entry);
        
        document.getElementById('modalAssist').style.display = 'none';
        // Aqui você salvaria as stats (autor.gols++, assist.assists++)
    }

    // Função para Troca de Emergência
    function trocarAtleta(idSaindo) {
        const espera = atletasApp.filter(a => !a.confirmado);
        if(espera.length === 0) return alert("Ninguém na fila de espera!");
        
        // Lógica simplificada: pega o primeiro da espera
        const entrando = espera[0];
        const saindo = atletasApp.find(a => a.id === idSaindo);
        
        saindo.confirmado = false;
        entrando.confirmado = true;
        entrando.time = saindo.time; // Herda o time
        
        const log = document.getElementById('gameLog');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.borderColor = 'var(--gold)';
        entry.innerHTML = `🔄 Sai: ${saindo.nome} / Entra: ${entrando.nome}`;
        log.prepend(entry);
        
        renderizarPartida(); // Atualiza os nomes em campo
    }

    function addRetardatario() {
        const nome = document.getElementById('nomeAtrasado').value;
        if(!nome) return;
        
        const novo = {
            id: atletasApp.length,
            nome: nome,
            cat: 'CONVIDADO',
            stars: 3,
            pos: 'A',
            img: '👟',
            confirmado: false // Entra na espera
        };
        atletasApp.push(novo);
        document.getElementById('nomeAtrasado').value = '';
        alert(`${nome} adicionado à fila!`);
        atualizarResumos(); 
    }
</script>
