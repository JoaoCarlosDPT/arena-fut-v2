<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --neon: #00ff88; --dark: #000; --card: #1a1a1a; --border: #333; --blue: #007bff; --red: #dc3545; --gold: #ffcc00; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; padding-bottom: 80px; }
        
        button { border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        
        /* O BOTÃO VERDE NEON DA IMAGEM APROVADA */
        .btn-neon { background: var(--neon); color: #000; padding: 15px; width: 100%; font-size: 1rem; }
        
        .btn-voltar { background: transparent; color: #888; border: 1px solid #444; padding: 8px 15px; margin-bottom: 10px; font-size: 11px; width: fit-content; }
        
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; box-sizing: border-box; }
        
        /* ESTRUTURA DE INPUTS DA IMAGEM APROVADA (Com Labels em Neon) */
        .input-group { margin-bottom: 18px; text-align: left; width: 100%; box-sizing: border-box; }
        
        /* Flexbox para as fileiras da imagem aprovada */
        .row { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        .col { flex: 1; min-width: 0; }

        label { font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 6px; margin-left: 5px; }
        
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: #111; 
            color: #fff; 
            box-sizing: border-box; 
            font-size: 14px; 
            outline: none; 
            -webkit-appearance: none; 
            display: block;
        }
        
        input:focus { border-color: var(--neon); }
        
        /* ESTILOS DA LISTA DE ATLETAS DA IMAGEM APROVADA (Sem barras de progresso ou avatares) */
        .section-title { font-size: 10px; font-weight: 900; color: #888; letter-spacing: 1px; margin: 15px 0 8px 5px; text-transform: uppercase; }
        
        .container-confirmados { background: rgba(0, 255, 136, 0.03); border-radius: 12px; padding: 5px; border: 1px solid #222; }
        .container-espera { background: rgba(255, 68, 68, 0.03); border-radius: 12px; padding: 5px; border: 1px dashed #442222; }
        
        .atleta-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="tela1" class="card" style="border-top: 5px solid var(--neon);">
        <div id="saudacao-container" style="text-align: left; margin-bottom: 25px; background: rgba(0,255,136,0.05); padding: 15px; border-radius: 12px; border: 1px solid #222;">
            <h3 id="txt-saudacao" style="color: var(--neon); margin: 0; font-size: 1.1rem; line-height: 1.4;">Fala, João! Já cobrou o PIX de quem disse que 'ia ver e avisava'?</h3>
            <p style="color: #666; font-size: 0.75rem; margin-top: 8px; font-weight: bold; text-transform: uppercase;">🎮 Painel do Gestor</p>
        </div>

        <div class="input-group">
            <label>Nome da Pelada</label>
            <input id="nomeEvento" placeholder="Ex: Pelada dos Amigos">
        </div>

        <div class="input-group">
            <label>Local da Arena</label>
            <input id="local" placeholder="Ex: Arena Soccer X">
        </div>

        <div class="row">
            <div class="col" style="flex: 1.5;">
                <label>Data</label>
                <input id="dataEv" type="date">
            </div>
            <div class="col">
                <label>Horário</label>
                <input id="horarioEv" type="time">
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>Limite Atletas</label>
                <input id="limite" type="number" placeholder="20">
            </div>
            <div class="col">
                <label>Atletas/Time</label>
                <input id="jogadoresPorTime" type="number" placeholder="5">
            </div>
        </div>

        <div class="row" style="align-items: flex-end;">
            <div class="col">
                <label>Tempo (Min)</label>
                <input id="tempoRegra" type="number" value="10">
            </div>
            <div class="col">
                <label>Tipo de Campo</label>
                <select id="tipoCampo">
                    <option>Society</option>
                    <option>Futsal</option>
                    <option>Campo</option>
                </select>
            </div>
        </div>

        <button class="btn-neon" style="margin-top: 10px; height: 55px;" onclick="irTela2()">CONVOCAR ATLETAS →</button>
    </div>

    <div id="tela2" style="display:none">
        <button class="btn-voltar" onclick="voltarPara(1)">← Voltar</button>
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px">
                <div style="flex:1; text-align:center; background:#0a0a0a; padding:12px; border-radius:12px; border: 1px solid #222">
                    <span id="countConf" style="color:var(--neon); font-size:22px; font-weight:bold">0</span><br><small style="color: #666">CONFIRMADOS</small>
                </div>
                <div style="flex:1; text-align:center; background:#0a0a0a; padding:12px; border-radius:12px; border: 1px solid #222">
                    <span id="countEsp" style="color:var(--red); font-size:22px; font-weight:bold">0</span><br><small style="color: #666">EM ESPERA</small>
                </div>
            </div>
            <textarea id="listaTexto" rows="3" placeholder="Cole a lista de atletas aqui..."></textarea>
            <button style="background:#333; color:#fff; padding:12px; width:100%; margin: 10px 0;" onclick="processarLista()">Carregar Lista</button>
            <div id="areaCheckin" style="display:none">
                <div class="section-title">✓ Confirmados</div>
                <div id="listaConfirmados" class="container-confirmados"></div>
                <div id="secaoEspera" style="display:none">
                    <div class="section-title" style="color: var(--red)">⚠ Espera</div>
                    <div id="corpoEspera" class="container-espera"></div>
                </div>
            </div>
            <div style="height: 80px;"></div>
            <button id="btnIniciar" class="btn-neon" style="position:fixed; bottom:15px; left:15px; right:15px; width:calc(100% - 30px); z-index:100;" onclick="alert('Iniciando Partida!')">Iniciar Partida</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCwi7wNRm-0Zg8W1sXVOFy-1EnGHjXyUCg",
            authDomain: "arena-fut-f1599.firebaseapp.com",
            projectId: "arena-fut-f1599",
            storageBucket: "arena-fut-f1599.firebasestorage.app",
            messagingSenderId: "835218567459",
            appId: "1:835218567459:web:8ff9a673cc523f6e7b9c96"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let app = { nomes: [], fila: [], atual: [[], []], ranking: {}, tempoSegundos: 0, interval: null, rodando: false, logsPartida: [], totalPartidas: 0, pendente: null, totalGols: 0 };

        function irTela2() { document.getElementById("tela1").style.display="none"; document.getElementById("tela2").style.display="block"; }
        function voltarPara(tela) { document.querySelectorAll('body > div').forEach(d => d.style.display="none"); document.getElementById("tela" + tela).style.display="block"; }

        function processarLista() {
            let t = document.getElementById("listaTexto").value;
            let ns = t.split("\n").map(n => n.replace(/^\d+[\s.-]*/, '').trim()).filter(n => n !== "");
            app.nomes = ns.map(n => ({ nome: n, conf: true }));
            document.getElementById("areaCheckin").style.display = "block";
            renderCheckin();
        }

        function renderCheckin() {
            let hC = "", hE = "", lim = parseInt(document.getElementById("limite").value) || 99, c = 0, e = 0;
            app.nomes.forEach((p, i) => {
                let item = `<div class="atleta-item"><div><b>${p.nome}</b></div><input type="checkbox" ${p.conf?'checked':''} style="width:22px; height:22px" onchange="app.nomes[${i}].conf=this.checked; renderCheckin()"></div>`;
                if (c < lim) { hC += item; if(p.conf) c++; } else { hE += item; if(p.conf) e++; }
            });
            document.getElementById("countConf").innerText = c; document.getElementById("countEsp").innerText = e;
            document.getElementById("listaConfirmados").innerHTML = hC || '<div style="padding:10px; color:#444; text-align:center">Vazio</div>';
            document.getElementById("corpoEspera").innerHTML = hE; document.getElementById("secaoEspera").style.display = hE ? "block" : "none";
        }
    </script>
</body>
</html>
