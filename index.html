    <div id="tela1" class="card" style="border-top: 5px solid var(--neon);">
        <div id="saudacao-container" style="text-align: left; margin-bottom: 25px; background: rgba(0,255,136,0.05); padding: 15px; border-radius: 12px; border: 1px solid #222;">
            <h3 id="txt-saudacao" style="color: var(--neon); margin: 0; font-size: 1.1rem; line-height: 1.4;"></h3>
            <p style="color: #666; font-size: 0.75rem; margin-top: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">🎮 Painel do Gestor</p>
        </div>

        <div class="input-group" style="margin-bottom: 15px;">
            <label style="font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase;">Nome da Pelada</label>
            <input id="nomeEvento" placeholder="Ex: Pelada dos Primos">
        </div>

        <div class="input-group" style="margin-bottom: 15px;">
            <label style="font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase;">Local da Arena</label>
            <input id="local" placeholder="Ex: Arena Soccer X">
        </div>

        <div style="display:flex; gap:10px; margin-bottom: 15px;">
            <div style="flex: 1.5;">
                <label style="font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase;">Data</label>
                <input id="dataEv" type="date">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase;">Horário</label>
                <input id="horarioEv" type="time">
            </div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom: 15px;">
            <div style="flex: 1;">
                <label style="font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase;">Limite Atletas</label>
                <input id="limite" type="number" placeholder="20">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase;">Atletas/Time</label>
                <input id="jogadoresPorTime" type="number" placeholder="5">
            </div>
        </div>

        <div style="display:flex; gap:10px; align-items: flex-end; margin-bottom: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase;">Tempo (Min)</label>
                <input id="tempoRegra" type="number" value="10">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase;">Tipo de Campo</label>
                <select id="tipoCampo">
                    <option>Society</option>
                    <option>Futsal</option>
                    <option>Campo</option>
                </select>
            </div>
        </div>

        <button class="btn-neon" style="margin-top: 20px; height: 55px; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,255,136,0.3);" onclick="irTela2()">
            CONVOCAR ATLETAS →
        </button>
    </div>

    <script>
        // LISTA DE FRASES DO GESTOR
        const frasesGestor = [
            "Fala, João! Já cobrou o PIX de quem disse que 'ia ver e avisava'?",
            "Bem-vindo, João. Preparado para ouvir que o gol foi de banheira o jogo todo?",
            "E aí, João! Já sabe quem vai ser o primeiro a pedir pra sair com 2 minutos?",
            "João, hoje é dia de expulsar quem trouxer chuteira de cravo pro Society!",
            "Fala, Capitão! Se o time do colete perder de novo, a culpa é sua, hein?",
            "Opa, João! A meta de hoje é não deixar o jogo virar UFC antes dos 10 minutos.",
            "Bem-vindo! Se o 'Perna de Pau' oficial já confirmou, boa sorte na gestão.",
            "João, lembre-se: quem chuta a bola pra fora do estádio é quem vai buscar.",
            "Fala, Chefe! Preparado para a choradeira do sorteio dos times?",
            "Chegou o homem! Se o jogo for ruim, pelo menos o churrasco tem que ser bom."
        ];

        // Lógica de Inicialização
        window.onload = function() {
            // Sorteia uma das 10 frases
            const fraseSorteada = frasesGestor[Math.floor(Math.random() * frasesGestor.length)];
            document.getElementById('txt-saudacao').innerText = fraseSorteada;
            
            // Coloca a data de hoje automaticamente
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dataEv').value = hoje;
        };

        // ... resto das funções do app (irTela2, processarLista, etc)
    </script>
