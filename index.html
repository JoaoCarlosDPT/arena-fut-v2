<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO - Full V3</title>
    <style>
        :root { --blue: #007bff; --red: #dc3545; --neon: #00ff88; --gold: #ffcc00; --bg: #0c0e11; --card: #15181d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; overflow-x: hidden; }
        #app { width: 100%; max-width: 420px; background: linear-gradient(180deg, #1a1d21 0%, #0c0e11 100%); border-radius: 35px; padding: 15px; border: 1px solid #222; display: flex; flex-direction: column; gap: 12px; }
        
        /* TIMER & SCORE */
        .clock { font-size: clamp(50px, 15vw, 65px); color: var(--gold); font-weight: bold; text-align: center; margin: 5px 0; text-shadow: 0 0 20px rgba(255,204,0,0.3); }
        .controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 5px; }
        .btn-c { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #333; background: #222; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .score-box { width: 75px; height: 75px; background: #000; border: 2px solid; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: bold; }

        /* FIELD PANEL */
        .field { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .team-card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .t-header { padding: 8px; font-size: 10px; font-weight: 900; text-align: center; text-transform: uppercase; color: #fff; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #1c1f24; font-size: 11px; }
        .btn-gol { background: #111; border: 1px solid var(--neon); color: var(--neon); font-size: 9px; padding: 4px 7px; border-radius: 5px; font-weight: bold; }

        /* LOGS & OUTCOME */
        .logs-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 10px; min-height: 85px; }
        .log-header { font-size: 9px; font-weight: 900; color: #444; text-align: center; margin-bottom: 5px; }
        .log-item { font-size: 10px; margin-bottom: 4px; color: #aaa; }
        
        .outcome-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: -5px; }
        .btn-out { background: var(--card); border: 1px solid #333; color: #fff; padding: 12px 5px; border-radius: 10px; font-weight: bold; font-size: 10px; cursor: pointer; }

        /* FILA & ATRASADO */
        .fila-box { border: 2px solid var(--neon); border-radius: 15px; padding: 12px; }
        .fila-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .next-list { font-size: 10px; color: #aaa; line-height: 1.4; }
        .add-atrasado { display: flex; gap: 8px; }
        .add-atrasado input { flex: 1; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; padding: 10px; font-size: 12px; }
        .btn-plus { background: var(--neon); border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; color: #000; }

        /* RANKING */
        .ranking-table { width: 100%; border-collapse: collapse; background: var(--card); font-size: 11px; border-radius: 12px; overflow: hidden; border: 1px solid #222; margin-top: 10px; }
        .ranking-table th { background: #222; padding: 8px; color: #666; text-align: left; }
        .ranking-table td { padding: 8px; border-bottom: 1px solid #222; }

        /* MODAL E DRAG AND DROP */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:999; }
        .m-content { background: var(--card); width:90%; max-height: 80vh; overflow-y: auto; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); }
        .fila-edit-item { background: #222; margin-bottom: 8px; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: grab; border: 1px solid #333; }
        .fila-edit-item.dragging { opacity: 0.5; background: #333; }
        .edit-btns { display: flex; gap: 5px; }
        .btn-edit { background: #333; border: 1px solid #444; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div id="app">
    <div class="clock" id="timer">10:00</div>
    <div class="controls">
        <button class="btn-c" onclick="startT()">▶</button>
        <button class="btn-c" onclick="pauseT()">Ⅱ</button>
        <button class="btn-c" onclick="resetT()">↺</button>
    </div>

    <div class="scoreboard">
        <div class="score-box" style="border-color:var(--blue); color:var(--blue)" id="s-azul">0</div>
        <div class="score-box" style="border-color:var(--red); color:var(--red)" id="s-red">0</div>
    </div>

    <div class="field" id="field"></div>

    <div class="logs-container">
        <div><div class="log-header" style="color:var(--blue)">AZUL LOG</div><div id="l-azul"></div></div>
        <div><div class="log-header" style="color:var(--red)">RED LOG</div><div id="l-red"></div></div>
    </div>

    <div class="outcome-row">
        <button class="btn-out" style="border-color:var(--blue); color:var(--blue)" onclick="processarFim('azul')">VITÓRIA AZUL</button>
        <button class="btn-out" style="border-color:var(--red); color:var(--red)" onclick="processarFim('red')">VITÓRIA RED</button>
        <button class="btn-out" onclick="processarFim('empate')">EMPATE</button>
    </div>

    <div class="fila-box">
        <div class="fila-header">
            <span style="color:var(--neon); font-weight:900; font-size:11px">PRÓXIMOS (FILA)</span>
            <button onclick="abrirEditorFila()" style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:9px; padding:3px 7px; border-radius:5px;">EDITAR FILA 🖊️</button>
        </div>
        <div class="next-list" id="fila-lista"></div>
    </div>

    <div class="add-atrasado">
        <input type="text" id="add-nome" placeholder="Adicionar retardatário...">
        <button class="btn-plus" onclick="addRetardatario()">+</button>
    </div>

    <table class="ranking-table">
        <thead><tr><th>ATLETA</th><th>V</th><th>G</th><th>A</th></tr></thead>
        <tbody id="r-body"></tbody>
    </table>
</div>

<div id="modal-assist" class="modal">
    <div class="m-content" style="border-color: var(--neon);">
        <h4 style="text-align:center; margin-top:0">Quem deu o passe? 👟</h4>
        <div id="opts"></div>
        <button onclick="gol(null)" style="width:100%; padding:15px; background:#111; color:#666; border:none; border-radius:10px; margin-top:10px;">GOL INDIVIDUAL</button>
    </div>
</div>

<div id="modal-fila" class="modal">
    <div class="m-content">
        <h4 style="text-align:center; margin-top:0; color: var(--gold);">Reordenar Fila 📋</h4>
        <p style="font-size: 10px; text-align: center; color: #666; margin-bottom: 10px;">Segure e arraste ou use as setas.</p>
        <div id="fila-editor-container"></div>
        <button onclick="fecharFila()" style="width:100%; padding:15px; background:var(--gold); color:#000; font-weight:bold; border:none; border-radius:10px; margin-top:15px;">SALVAR</button>
    </div>
</div>

<script>
    let atletas = [
        { n: "Lucas", p: "G", v: 2, g: 0, a: 0, t: "azul" },
        { n: "Pedro", p: "A", v: 1, g: 2, a: 1, t: "azul" },
        { n: "Mateus", p: "A", v: 1, g: 1, a: 2, t: "azul" },
        { n: "Carlos", p: "A", v: 0, g: 0, a: 0, t: "azul" },
        { n: "Daniel", p: "A", v: 0, g: 0, a: 0, t: "azul" },
        { n: "Ricardo", p: "G", v: 0, g: 0, a: 0, t: "red" },
        { n: "Silva", p: "A", v: 0, g: 1, a: 0, t: "red" },
        { n: "André", p: "A", v: 0, g: 0, a: 0, t: "red" },
        { n: "Roberto", p: "A", v: 0, g: 0, a: 0, t: "red" },
        { n: "Felipe", p: "A", v: 0, g: 0, a: 0, t: "red" }
    ];
    let fila = ["Gustavo", "Bruno", "Vinícius", "Henrique", "Fábio", "Tiago", "Leo", "Beto"];
    let sAzul = 0, sRed = 0, segs = 600, tId = null, autor = null;

    // LÓGICA DO JOGO (RODÍZIO)
    function processarFim(resultado) {
        let perdedores = [];
        let timePerdedor = "";

        if (resultado === 'azul') {
            // Azul vence, Red perde
            timePerdedor = "red";
            atletas.filter(a => a.t === 'azul').forEach(a => a.v++);
        } else if (resultado === 'red') {
            // Red vence, Azul perde
            timePerdedor = "azul";
            atletas.filter(a => a.t === 'red').forEach(a => a.v++);
        } else {
            // Empate: ambos perdem a vaga
            atletas.filter(a => a.t === 'azul' || a.t === 'red').forEach(a => {
                let p = atletas.find(x => x.n === a.n);
                fila.push(p.n);
            });
            atletas = atletas.filter(a => a.t !== 'azul' && a.t !== 'red');
            rodarFila('azul');
            rodarFila('red');
            resetPlacar(); return;
        }

        // Mover perdedores para fila e remover do time
        atletas.filter(a => a.t === timePerdedor).forEach(a => fila.push(a.n));
        atletas = atletas.filter(a => a.t !== timePerdedor);
        
        rodarFila(timePerdedor);
        resetPlacar();
    }

    function rodarFila(time) {
        for(let i=0; i<5; i++) {
            let nome = fila.shift() || "Vaga";
            atletas.push({ n: nome, p: "A", v: 0, g: 0, a: 0, t: time });
        }
        render();
    }

    function render() {
        const field = document.getElementById('field');
        field.innerHTML = `
            <div class="team-card"><div class="t-header" style="background:var(--blue)">TIME AZUL</div>${atletas.filter(a => a.t === 'azul').map(a => `<div class="row"><span><b>${a.p}</b> ${a.n}</span><button class="btn-gol" onclick="abrAssist('${a.n}', 'azul')">GOL</button></div>`).join('')}</div>
            <div class="team-card"><div class="t-header" style="background:var(--red)">TIME RED</div>${atletas.filter(a => a.t === 'red').map(a => `<div class="row"><span><b>${a.p}</b> ${a.n}</span><button class="btn-gol" onclick="abrAssist('${a.n}', 'red')">GOL</button></div>`).join('')}</div>
        `;
        const sorted = [...atletas].sort((a,b) => (b.g + b.a) - (a.g + a.a));
        document.getElementById('r-body').innerHTML = sorted.map(a => `<tr><td>${a.n}</td><td>${a.v}</td><td>${a.g}</td><td>${a.a}</td></tr>`).join('');
        
        let fText = ""; for(let i=0; i<fila.length; i+=5) fText += `TIME ${Math.floor(i/5) + 1}: [${fila.slice(i, i+5).join(", ")}]<br>`;
        document.getElementById('fila-lista').innerHTML = fText || "Fila vazia";
    }

    // DRAG AND DROP E EDIÇÃO
    function abrirEditorFila() {
        const c = document.getElementById('fila-editor-container');
        c.innerHTML = "";
        fila.forEach((n, i) => {
            const d = document.createElement('div');
            d.className = 'fila-edit-item'; d.draggable = true; d.dataset.index = i;
            d.innerHTML = `<span>☰ ${n}</span><div class="edit-btns"><button class="btn-edit" onclick="mover(${i}, -1)">↑</button><button class="btn-edit" onclick="mover(${i}, 1)">↓</button><button class="btn-edit" style="color:var(--red)" onclick="fila.splice(${i},1); abrirEditorFila();">✕</button></div>`;
            d.addEventListener('dragstart', (e) => d.classList.add('dragging'));
            d.addEventListener('dragend', () => { d.classList.remove('dragging'); reordenarFila(); });
            c.appendChild(d);
        });
        document.getElementById('modal-fila').style.display = 'flex';
    }

    // Lógica para capturar o drop
    document.getElementById('fila-editor-container').addEventListener('dragover', e => {
        e.preventDefault();
        const after = getDragAfterElement(document.getElementById('fila-editor-container'), e.clientY);
        const dragging = document.querySelector('.dragging');
        if(after) document.getElementById('fila-editor-container').insertBefore(dragging, after);
        else document.getElementById('fila-editor-container').appendChild(dragging);
    });

    function getDragAfterElement(container, y) {
        const els = [...container.querySelectorAll('.fila-edit-item:not(.dragging)')];
        return els.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
            else return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function reordenarFila() {
        fila = [...document.querySelectorAll('.fila-edit-item')].map(el => el.innerText.replace('☰ ', ''));
        render();
    }

    // Funções auxiliares mantidas
    function mover(i, d) { let np = i + d; if(np>=0 && np<fila.length) {[fila[i], fila[np]] = [fila[np], fila[i]]; abrirEditorFila(); render(); } }
    function fecharFila() { document.getElementById('modal-fila').style.display = 'none'; }
    function gol(assist) {
        let aObj = atletas.find(x => x.n === autor);
        aObj.g++; if(assist) atletas.find(x => x.n === assist).a++;
        aObj.t === 'azul' ? sAzul++ : sRed++;
        document.getElementById('s-azul').innerText = sAzul; document.getElementById('s-red').innerText = sRed;
        document.getElementById('modal-assist').style.display = 'none';
        render();
    }
    function abrAssist(n, t) { autor = n; const opts = document.getElementById('opts'); opts.innerHTML = atletas.filter(a => a.t === t && a.n !== n).map(c => `<button onclick="gol('${c.n}')" style="width:100%; padding:12px; margin:5px 0; background:#222; color:#fff; border:1px solid #444; border-radius:10px;">${c.n}</button>`).join(''); document.getElementById('modal-assist').style.display = 'flex'; }
    function resetPlacar() { sAzul=0; sRed=0; document.getElementById('s-azul').innerText=0; document.getElementById('s-red').innerText=0; resetT(); }
    function startT() { if(!tId) tId = setInterval(() => { if(segs>0) { segs--; let m=Math.floor(segs/60), s=segs%60; document.getElementById('timer').innerText=`${m}:${s<10?'0':''}${s}`; } }, 1000); }
    function pauseT() { clearInterval(tId); tId = null; }
    function resetT() { pauseT(); segs = 600; document.getElementById('timer').innerText="10:00"; }
    function addRetardatario() { const inp = document.getElementById('add-nome'); if(inp.value) { fila.push(inp.value); inp.value=""; render(); } }

    render();
</script>
</body>
</html>
