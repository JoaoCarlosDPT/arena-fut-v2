<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARENA FUT PRO v2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #d4ff00; --bg: #000000; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-container { text-align: center; width: 90%; max-width: 400px; padding: 20px; }
        .logo { font-size: 2.5rem; font-weight: 900; font-style: italic; color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 40px; font-size: 0.9rem; letter-spacing: 1px; }
        .btn-google { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-google:active { transform: scale(0.95); opacity: 0.8; }
        #msg-status { margin-top: 20px; font-size: 0.8rem; color: #ff4444; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">ARENA FUT PRO</div>
        <div class="subtitle">GESTÃO DE PELADAS v2.0</div>
        
        <button class="btn-google" onclick="fazerLogin()">
            ENTRAR COM GOOGLE
        </button>

        <div id="msg-status"></div>
    </div>

    <script>
        // Use os dados do projeto V2 que você criou no Firebase Console
        const firebaseConfig = {
            apiKey: "COLE_AQUI_A_API_KEY_DO_V2",
            authDomain: "SEU-PROJETO-V2.firebaseapp.com",
            projectId: "SEU-PROJETO-V2",
            appId: "SEU-APP-ID-AQUI"
        };

        // Inicializar
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function fazerLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    console.log("Usuário logado:", result.user.displayName);
                    // Aqui depois enviaremos para a Tela de Gestão
                    alert("Sucesso, " + result.user.displayName + "! Vamos pro jogo.");
                })
                .catch((error) => {
                    document.getElementById('msg-status').innerText = "Erro no Login: " + error.message;
                });
        }
    </script>
</body>
</html>
