<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Fut PRO - Teste Funcional Completo</title>
    <style>
        :root {
            --bg-body: #0c0e11; --bg-card: #15181d; --blue: #007bff; --red: #dc3545;
            --neon-green: #00ff88; --gold: #ffcc00; --border: #222;
        }
        body { background: var(--bg-body); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 400px; background: #1a1d21; border-radius: 30px; padding: 20px; border: 1px solid var(--border); }
        
        /* TIMER E PLACAR */
        .clock { font-size: 70px; font-weight: bold; color: var(--gold); text-align: center; margin: 10px 0; }
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .score-box { width: 80px; height: 80px; border-radius: 12px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; border: 2px solid transparent; }
        .score-box.azul { color: var(--blue); border-color: var(--blue); }
        .score-box.red { color: var(--red); border-color: var(--red); }

        /* FIELD PANEL */
        .field-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .team-card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        .team-h { padding: 8px; text-align: center; font-size: 11px; font-weight: bold; }
        .p-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 12px; }
        .btn-gol { background: none; border: 1px solid var(--neon-green); color: var(--neon-green); font-size: 9px; padding: 3px 6px; border-radius: 4px; cursor: pointer; }

        /* RANKING */
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; background: #111; border-radius: 10px; overflow: hidden; }
        .ranking-table th { background: #222; padding: 8px; text-align: left; color: var(--gold); }
        .ranking-table td { padding: 8px; border-bottom: 1px solid #222; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10; }
        .modal-content { background: #1a1d21; padding: 20px; border-radius: 15px; width: 80%; border: 1px solid var(--neon-green); }
        .opt-assist { background: #222; padding: 12px; margin: 8px 0; border-radius: 8px; text-align: center; cursor: pointer; }

        .fila-box { border: 1px solid var(--neon-green); border-radius: 10px; padding: 10px; margin: 15px 0; }
        .btn-outcome { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; font-weight: bold; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div class="clock" id="timer">10:00</div>
    
    <div class="scoreboard">
        <div class="score-box azul" id="s-azul">0</div>
        <div class="score-box red" id="s-red">0</div>
    </div>

    <div class="field-panel">
        <div class="team-card"><div class="team-h" style="background:var(--blue)">AZUL</div><div id="p-azul"></div></div>
        <div class="team-card"><div class="team-h" style="background:var(--red)">RED</div><div id="p-red"></div></div>
    </div>

    <div id="log" style="font-size: 10px; color: #777; height: 50px; overflow-y: auto; border-bottom: 1px solid #333;">Logs do jogo aparecerão aqui...</div>

    <div class="fila-box">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="color:var(--neon-green); font-size:11px; font-weight:bold">PRÓXIMO TIME</span>
            <button onclick="alert('Modo Edição de Fila Ativado')" style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:9px; border-radius:5px; padding:2px 5px">EDITAR</button>
        </div>
        <p id="txt-fila" style="font-size:10px; color:#888; margin:5px 0"></p>
    </div>

    <div style="display:flex; gap:5px; margin-bottom:15px">
        <input type="text" id="in-atrasado" placeholder="Nome do atrasado..." style="flex:1; background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:5px">
        <button onclick="addAtrasado()" style="background:var(--neon-green); border:none; padding:0 15px; border-radius:5px; font-weight:bold">+</button>
    </div>

    <table class="ranking-table">
        <thead><tr><th>ATLETA</th><th>V</th><th>G</th><th>A</th></tr></thead>
        <tbody id="rank-body"></tbody>
    </table>

    <button class="btn-outcome" onclick="location.reload()">FINALIZAR PARTIDA</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h4 style="margin:0 0 15px 0; text-align:center">Quem deu a assistência?</h4>
        <div id="opts"></div>
        <div class="opt-assist" style="color:#666" onclick="confirmarGol(null)">SEM ASSISTÊNCIA</div>
    </div>
</div>

<script>
    let atletas = [
        {nome: "Lucas", time: "azul", g:0, a:0, v:0}, {nome: "Pedro", time: "azul", g:0, a:0, v:0},
        {nome: "Mateus", time: "red", g:0, a:0, v:0}, {nome: "Silva", time: "red", g:0, a:0, v:0}
    ];
    let fila = ["Gustavo", "Bruno", "Fábio"];
    let autorAtual = "";

    function renderAtletas() {
        document.getElementById('p-azul').innerHTML = atletas.filter(a => a.time === "azul").map(a => `
            <div class="p-row"><span>${a.nome}</span><button class="btn-gol" onclick="abrirAssist('${a.nome}')">GOL</button></div>
        `).join('');
        document.getElementById('p-red').innerHTML = atletas.filter(a => a.time === "red").map(a => `
            <div class="p-row"><span>${a.nome}</span><button class="btn-gol" onclick="abrirAssist('${a.nome}')">GOL</button></div>
        `).join('');
        document.getElementById('txt-fila').innerText = "FILA: " + fila.join(", ");
        renderRanking();
    }

    function abrirAssist(nome) {
        autorAtual = nome;
        const o Atleta = atletas.find(a => a.nome === nome);
        const parceiros = atletas.filter(a => a.time === oAtleta.time && a.nome !== nome);
        document.getElementById('opts').innerHTML = parceiros.map(p => `
            <div class="opt-assist" onclick="confirmarGol('${p.nome}')">${p.nome}</div>
        `).join('');
        document.getElementById('modal').style.display = 'flex';
    }

    function confirmarGol(assist) {
        const autor = atletas.find(a => a.nome === autorAtual);
        autor.g++;
        if(assist) { atletas.find(a => a.nome === assist).a++; }
        
        document.getElementById(`s-${autor.time}`).innerText = atletas.filter(a => a.time === autor.time).reduce((sum, x) => sum + x.g, 0);
        document.getElementById('log').innerHTML = `⚽ Gol de ${autorAtual}${assist ? ' (Passe: '+assist+')' : ''}<br>` + document.getElementById('log').innerHTML;
        
        document.getElementById('modal').style.display = 'none';
        renderRanking();
    }

    function renderRanking() {
        document.getElementById('rank-body').innerHTML = atletas.concat(fila.map(f => ({nome: f, v:0, g:0, a:0})))
            .sort((a,b) => (b.g + b.a) - (a.g + a.a))
            .map(a => `<tr><td>${a.nome}</td><td>${a.v}</td><td>${a.g}</td><td>${a.a}</td></tr>`).join('');
    }

    function addAtrasado() {
        const n = document.getElementById('in-atrasado').value;
        if(n) { fila.push(n); document.getElementById('in-atrasado').value = ""; renderAtletas(); }
    }

    renderAtletas();
</script>
</body>
</html>
