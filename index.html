<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO - Versão Final</title>
    <style>
        :root { --blue: #007bff; --red: #dc3545; --neon: #00ff88; --gold: #ffcc00; --bg: #0c0e11; --card: #15181d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 420px; background: linear-gradient(180deg, #1a1d21 0%, #0c0e11 100%); border-radius: 35px; padding: 15px; border: 1px solid #222; display: flex; flex-direction: column; gap: 12px; }
        
        /* TIMER & SCORE */
        .clock { font-size: 60px; color: var(--gold); font-weight: bold; text-align: center; margin: 5px 0; text-shadow: 0 0 20px rgba(255,204,0,0.3); }
        .controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 5px; }
        .btn-c { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #333; background: #222; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .score-box { width: 75px; height: 75px; background: #000; border: 2px solid; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: bold; }

        /* FIELD PANEL */
        .field { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .team-card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .t-header { padding: 8px; font-size: 10px; font-weight: 900; text-align: center; text-transform: uppercase; color: #fff; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #1c1f24; font-size: 11px; }
        .btn-gol { background: #111; border: 1px solid var(--neon); color: var(--neon); font-size: 9px; padding: 4px 7px; border-radius: 5px; font-weight: bold; }

        /* LOGS & OUTCOME */
        .logs-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 10px; min-height: 85px; }
        .log-header { font-size: 9px; font-weight: 900; color: #444; text-align: center; margin-bottom: 5px; }
        .log-item { font-size: 10px; margin-bottom: 4px; color: #aaa; }
        .outcome-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-out { background: var(--card); border: 1px solid #333; color: #fff; padding: 12px 5px; border-radius: 10px; font-weight: bold; font-size: 10px; cursor: pointer; }

        /* FILA & MODAIS */
        .fila-box { border: 2px solid var(--neon); border-radius: 15px; padding: 12px; }
        .fila-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .next-list { font-size: 10px; color: #aaa; line-height: 1.4; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:999; }
        .m-content { background: var(--card); width:90%; max-height: 85vh; overflow-y: auto; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); }
        .fila-edit-item { background: #222; margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; cursor: grab; }
        .fila-edit-item.dragging { opacity: 0.4; border: 1px dashed var(--gold); }
        .drag-handle { color: #555; font-size: 18px; margin-right: 10px; }
        .btn-edit { background: #111; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body>

<div id="app">
    <div class="clock">10:00</div>
    <div class="controls">
        <button class="btn-c" onclick="startT()">▶</button>
        <button class="btn-c" onclick="pauseT()">Ⅱ</button>
        <button class="btn-c" onclick="resetT()">↺</button>
    </div>

    <div class="scoreboard">
        <div class="score-box" style="border-color:var(--blue); color:var(--blue)" id="s-azul">0</div>
        <div class="score-box" style="border-color:var(--red); color:var(--red)" id="s-red">0</div>
    </div>

    <div class="field" id="field"></div>

    <div class="logs-container">
        <div><div class="log-header" style="color:var(--blue)">AZUL LOG</div><div id="l-azul"></div></div>
        <div><div class="log-header" style="color:var(--red)">RED LOG</div><div id="l-red"></div></div>
    </div>

    <div class="outcome-row">
        <button class="btn-out" style="border-color:var(--blue); color:var(--blue)" onclick="finalizarPartida('azul')">VITÓRIA AZUL</button>
        <button class="btn-out" style="border-color:var(--red); color:var(--red)" onclick="finalizarPartida('red')">VITÓRIA RED</button>
        <button class="btn-out" onclick="finalizarPartida('empate')">EMPATE</button>
    </div>

    <div class="fila-box">
        <div class="fila-header">
            <span style="color:var(--neon); font-weight:900; font-size:11px">PRÓXIMOS (FILA)</span>
            <button onclick="abrirEditorFila()" style="background:none; border:1px solid #fff; color:#fff; font-size:9px; padding:3px 7px; border-radius:5px;">EDITAR FILA 🖊️</button>
        </div>
        <div class="next-list" id="fila-lista"></div>
    </div>
</div>

<div id="modal-assist" class="modal">
    <div class="m-content">
        <h4 style="text-align:center; margin-top:0">Quem deu o passe? 👟</h4>
        <div id="opts"></div>
        <button onclick="registrarGol(null)" style="width:100%; padding:15px; background:#111; color:#666; border:none; border-radius:10px; margin-top:10px;">GOL INDIVIDUAL</button>
    </div>
</div>

<div id="modal-fila" class="modal">
    <div class="m-content">
        <h4 style="text-align:center; color: var(--gold);">Reordenar Fila 📋</h4>
        <div id="fila-editor-container"></div>
        <button onclick="fecharFila()" style="width:100%; padding:15px; background:var(--gold); color:#000; font-weight:bold; border:none; border-radius:10px; margin-top:15px;">SALVAR</button>
    </div>
</div>

<script>
    let atletasEmCampo = { azul: ["Lucas", "Pedro", "Mateus", "Carlos", "Daniel"], red: ["Ricardo", "Silva", "André", "Roberto", "Felipe"] };
    let fila = ["Gustavo", "Bruno", "Vinícius", "Henrique", "Fábio", "Tiago", "Leo", "Beto"];
    let sAzul = 0, sRed = 0, segs = 600, tId = null, autorNome = null;

    function render() {
        const field = document.getElementById('field');
        field.innerHTML = `
            <div class="team-card"><div class="t-header" style="background:var(--blue)">TIME AZUL</div>${atletasEmCampo.azul.map(n => `<div class="row"><span>${n}</span><button class="btn-gol" onclick="preparaGol('${n}', 'azul')">GOL</button></div>`).join('')}</div>
            <div class="team-card"><div class="t-header" style="background:var(--red)">TIME RED</div>${atletasEmCampo.red.map(n => `<div class="row"><span>${n}</span><button class="btn-gol" onclick="preparaGol('${n}', 'red')">GOL</button></div>`).join('')}</div>
        `;
        let fText = ""; for (let i = 0; i < fila.length; i += 5) fText += `TIME ${Math.floor(i/5) + 1}: [${fila.slice(i, i+5).join(", ")}]<br>`;
        document.getElementById('fila-lista').innerHTML = fText || "Fila vazia";
    }

    function preparaGol(n, t) { autorNome = {n, t}; const opts = document.getElementById('opts'); opts.innerHTML = atletasEmCampo[t].filter(x => x !== n).map(x => `<button onclick="registrarGol('${x}')" style="width:100%; padding:12px; margin:5px 0; background:#222; color:#fff; border:1px solid #444; border-radius:10px;">${x}</button>`).join(''); document.getElementById('modal-assist').style.display = 'flex'; }
    function registrarGol(assist) { autorNome.t === 'azul' ? sAzul++ : sRed++; document.getElementById('s-'+autorNome.t).innerText = autorNome.t === 'azul' ? sAzul : sRed; document.getElementById('modal-assist').style.display = 'none'; document.getElementById('l-'+autorNome.t).innerHTML = `<div class="log-item">⚽ <b>${autorNome.n}</b> ${assist ? '(👟 '+assist+')' : ''}</div>` + document.getElementById('l-'+autorNome.t).innerHTML; }
    
    function finalizarPartida(res) {
        let perd = res === 'azul' ? [...atletasEmCampo.red] : (res === 'red' ? [...atletasEmCampo.azul] : []);
        if(res !== 'empate') {
            if(res === 'azul') atletasEmCampo.red = fila.splice(0, 5);
            else atletasEmCampo.azul = fila.splice(0, 5);
            fila.push(...perd);
        }
        sAzul=0; sRed=0; document.getElementById('s-azul').innerText=0; document.getElementById('s-red').innerText=0; document.getElementById('l-azul').innerHTML=""; document.getElementById('l-red').innerHTML=""; resetT(); render();
    }

    function abrirEditorFila() {
        const c = document.getElementById('fila-editor-container'); c.innerHTML = "";
        fila.forEach((n, i) => {
            const d = document.createElement('div'); d.className = 'fila-edit-item'; d.draggable = true; d.innerHTML = `<div class="edit-info"><span class="drag-handle">☰</span> ${n}</div><div class="edit-btns"><button class="btn-edit" onclick="mover(${i}, -1)">↑</button><button class="btn-edit" onclick="mover(${i}, 1)">↓</button><button class="btn-edit" style="color:var(--red)" onclick="fila.splice(${i},1); abrirEditorFila();">✕</button></div>`;
            d.addEventListener('dragstart', () => d.classList.add('dragging'));
            d.addEventListener('dragend', () => { d.classList.remove('dragging'); reordenarPeloDrag(); });
            c.appendChild(d);
        });
        document.getElementById('modal-fila').style.display = 'flex';
    }

    function reordenarPeloDrag() { fila = [...document.querySelectorAll('.fila-edit-item')].map(el => el.innerText.replace('☰', '').trim()); render(); }
    function mover(i, d) { let np = i + d; if(np >=0 && np < fila.length) {[fila[i], fila[np]] = [fila[np], fila[i]]; abrirEditorFila(); render(); } }
    function fecharFila() { document.getElementById('modal-fila').style.display = 'none'; render(); }
    
    function startT() { if(!tId) tId = setInterval(() => { if(segs>0) { segs--; let m=Math.floor(segs/60), s=segs%60; document.querySelector('.clock').innerText=`${m}:${s<10?'0':''}${s}`; } }, 1000); }
    function pauseT() { clearInterval(tId); tId = null; }
    function resetT() { pauseT(); segs = 600; document.querySelector('.clock').innerText="10:00"; }

    render();
</script>
</body>
</html>
