<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,  maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO - Full V3</title>
    <style>
        :root { --blue: #007bff; --red: #dc3545; --neon: #00ff88; --gold: #ffcc00; --bg: #0c0e11; --card: #15181d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 420px; background: linear-gradient(180deg, #1a1d21 0%, #0c0e11 100%); border-radius: 35px; padding: 15px; border: 1px solid #222; display: flex; flex-direction: column; gap: 12px; }
        
        /* HEADER & SCORE */
        .clock { font-size: 60px; color: var(--gold); font-weight: bold; text-align: center; margin: 5px 0; text-shadow: 0 0 20px rgba(255,204,0,0.3); }
        .controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 5px; }
        .btn-c { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #333; background: #222; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .score-box { width: 75px; height: 75px; background: #000; border: 2px solid; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: bold; transition: 0.3s; }

        /* FIELD PANEL */
        .field { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .team-card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .t-header { padding: 8px; font-size: 10px; font-weight: 900; text-align: center; text-transform: uppercase; color: #fff; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #1c1f24; font-size: 11px; }
        .btn-gol { background: #111; border: 1px solid var(--neon); color: var(--neon); font-size: 9px; padding: 4px 7px; border-radius: 5px; font-weight: bold; }

        /* LOGS & OUTCOME */
        .logs-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 10px; min-height: 85px; }
        .log-header { font-size: 9px; font-weight: 900; color: #444; text-align: center; margin-bottom: 5px; }
        .log-item { font-size: 10px; margin-bottom: 4px; color: #aaa; }
        .outcome-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-out { background: var(--card); border: 1px solid #333; color: #fff; padding: 12px 5px; border-radius: 10px; font-weight: bold; font-size: 10px; cursor: pointer; }

        /* FILA */
        .fila-box { border: 2px solid var(--neon); border-radius: 15px; padding: 12px; }
        .fila-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .next-list { font-size: 10px; color: #aaa; line-height: 1.4; }

        /* MODAIS */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:999; }
        .m-content { background: var(--card); width:90%; max-height: 85vh; overflow-y: auto; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); }
        
        /* EDITOR DE FILA DRAG N DROP */
        .fila-edit-item { background: #222; margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; cursor: grab; }
        .fila-edit-item.dragging { opacity: 0.4; border: 1px dashed var(--gold); }
        .edit-info { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: bold; }
        .drag-handle { color: #555; font-size: 18px; }
        .edit-btns { display: flex; gap: 5px; }
        .btn-edit { background: #111; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body>

<div id="app">
    <div class="clock-section">
        <div class="clock" id="timer">10:00</div>
        <div class="controls">
            <button class="btn-c" onclick="startT()">▶</button>
            <button class="btn-c" onclick="pauseT()">Ⅱ</button>
            <button class="btn-c" onclick="resetT()">↺</button>
        </div>
    </div>

    <div class="scoreboard">
        <div class="score-box" style="border-color:var(--blue); color:var(--blue)" id="s-azul">0</div>
        <div class="score-box" style="border-color:var(--red); color:var(--red)" id="s-red">0</div>
    </div>

    <div class="field" id="field"></div>

    <div class="logs-container">
        <div><div class="log-header" style="color:var(--blue)">AZUL LOG</div><div id="l-azul"></div></div>
        <div><div class="log-header" style="color:var(--red)">RED LOG</div><div id="l-red"></div></div>
    </div>

    <div class="outcome-row">
        <button class="btn-out" style="border-color:var(--blue); color:var(--blue)" onclick="finalizarPartida('azul')">VITÓRIA AZUL</button>
        <button class="btn-out" style="border-color:var(--red); color:var(--red)" onclick="finalizarPartida('red')">VITÓRIA RED</button>
        <button class="btn-out" onclick="finalizarPartida('empate')">EMPATE</button>
    </div>

    <div class="fila-box">
        <div class="fila-header">
            <span style="color:var(--neon); font-weight:900; font-size:11px">PRÓXIMOS (FILA)</span>
            <button onclick="abrirEditorFila()" style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:9px; padding:3px 7px; border-radius:5px;">EDITAR FILA 🖊️</button>
        </div>
        <div class="next-list" id="fila-lista"></div>
    </div>

    <div style="display: flex; gap: 8px;">
        <input type="text" id="add-nome" placeholder="Nome do atrasado..." style="flex: 1; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; padding: 10px; font-size: 12px;">
        <button onclick="addRetardatario()" style="background: var(--neon); border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; color: #000;">+</button>
    </div>
</div>

<div id="modal-fila" class="modal">
    <div class="m-content">
        <h4 style="text-align:center; margin-top:0; color: var(--gold);">Reordenar Fila 📋</h4>
        <p style="font-size: 10px; color: #888; text-align: center; margin-bottom: 15px;">Segure e arraste para reordenar ou use as setas.</p>
        <div id="fila-editor-container"></div>
        <button onclick="fecharFila()" style="width:100%; padding:15px; background:var(--gold); color:#000; font-weight:bold; border:none; border-radius:10px; margin-top:15px;">SALVAR E FECHAR</button>
    </div>
</div>

<div id="modal-assist" class="modal">
    <div class="m-content" style="border-color: var(--neon);">
        <h4 style="text-align:center; margin-top:0">Quem deu o passe? 👟</h4>
        <div id="opts"></div>
        <button onclick="registrarGol(null)" style="width:100%; padding:15px; background:#111; color:#666; border:none; border-radius:10px; margin-top:10px;">GOL INDIVIDUAL</button>
    </div>
</div>

<script>
    // DADOS INICIAIS
    let atletasEmCampo = {
        azul: ["Lucas", "Pedro", "Mateus", "Carlos", "Daniel"],
        red: ["Ricardo", "Silva", "André", "Roberto", "Felipe"]
    };
    let fila = ["Gustavo", "Bruno", "Vinícius", "Henrique", "Fábio", "Tiago", "Leo", "Beto"];
    let sAzul = 0, sRed = 0, segs = 600, tId = null, autorNome = null;

    function render() {
        const field = document.getElementById('field');
        field.innerHTML = `
            <div class="team-card">
                <div class="t-header" style="background:var(--blue)">TIME AZUL</div>
                ${atletasEmCampo.azul.map(n => `<div class="row"><span>${n}</span><button class="btn-gol" onclick="preparaGol('${n}', 'azul')">GOL</button></div>`).join('')}
            </div>
            <div class="team-card">
                <div class="t-header" style="background:var(--red)">TIME RED</div>
                ${atletasEmCampo.red.map(n => `<div class="row"><span>${n}</span><button class="btn-gol" onclick="preparaGol('${n}', 'red')">GOL</button></div>`).join('')}
            </div>
        `;
        
        let filaTexto = "";
        for (let i = 0; i < fila.length; i += 5) {
            filaTexto += `TIME ${Math.floor(i/5) + 1}: [${fila.slice(i, i+5).join(", ")}]<br>`;
        }
        document.getElementById('fila-lista').innerHTML = filaTexto || "Fila vazia";
    }

    // GOL E ASSISTÊNCIA
    function preparaGol(nome, time) {
        autorNome = { nome, time };
        const opts = document.getElementById('opts');
        opts.innerHTML = atletasEmCampo[time].filter(n => n !== nome).map(n => `<button onclick="registrarGol('${n}')" style="width:100%; padding:12px; margin:5px 0; background:#222; color:#fff; border:1px solid #444; border-radius:10px;">${n}</button>`).join('');
        document.getElementById('modal-assist').style.display = 'flex';
    }

    function registrarGol(assist) {
        if(autorNome.time === 'azul') sAzul++; else sRed++;
        document.getElementById('s-azul').innerText = sAzul;
        document.getElementById('s-red').innerText = sRed;
        document.getElementById('modal-assist').style.display = 'none';
        
        const log = document.getElementById(`l-${autorNome.time}`);
        log.innerHTML = `<div class="log-item">⚽ <b>${autorNome.nome}</b> ${assist ? '(👟 '+assist+')' : ''}</div>` + log.innerHTML;
    }

    // LÓGICA DE GIRO (VITÓRIA/EMPATE)
    function finalizarPartida(resultado) {
        let perdedores = [];
        if (resultado === 'azul') {
            perdedores = [...atletasEmCampo.red];
            proximoTime('red');
        } else if (resultado === 'red') {
            perdedores = [...atletasEmCampo.azul];
            proximoTime('azul');
        } else { // Empate (Regra: O mais antigo em campo sai ou critério da pelada - aqui sai o azul por padrão)
            perdedores = [...atletasEmCampo.azul];
            proximoTime('azul');
        }
        
        fila.push(...perdedores); // Perdedores vão para o fim da fila
        resetPlacar();
        render();
    }

    function proximoTime(timeQueSai) {
        if (fila.length < 5) alert("Fila incompleta! Completando com o que tem.");
        atletasEmCampo[timeQueSai] = fila.splice(0, 5);
    }

    function resetPlacar() {
        sAzul = 0; sRed = 0;
        document.getElementById('s-azul').innerText = 0;
        document.getElementById('s-red').innerText = 0;
        document.getElementById('l-azul').innerHTML = "";
        document.getElementById('l-red').innerHTML = "";
        resetT();
    }

    // EDITOR DE FILA (DRAG N DROP)
    function abrirEditorFila() {
        const container = document.getElementById('fila-editor-container');
        renderEditor();
        document.getElementById('modal-fila').style.display = 'flex';
    }

    function renderEditor() {
        const container = document.getElementById('fila-editor-container');
        container.innerHTML = "";
        fila.forEach((nome, i) => {
            const div = document.createElement('div');
            div.className = 'fila-edit-item';
            div.draggable = true;
            div.dataset.index = i;
            div.innerHTML = `
                <div class="edit-info"><span class="drag-handle">☰</span> ${nome}</div>
                <div class="edit-btns">
                    <button class="btn-edit" onclick="mover(${i}, -1)">↑</button>
                    <button class="btn-edit" onclick="mover(${i}, 1)">↓</button>
                    <button class="btn-edit" style="color:var(--red)" onclick="remover(${i})">✕</button>
                </div>
            `;
            
            // Eventos Drag
            div.addEventListener('dragstart', () => div.classList.add('dragging'));
            div.addEventListener('dragend', () => {
                div.classList.remove('dragging');
                reordenarPeloDrag();
            });
            container.appendChild(div);
        });

        container.addEventListener('dragover', e => {
            e.preventDefault();
            const afterElement = getDragAfterElement(container, e.clientY);
            const dragging = document.querySelector('.dragging');
            if (afterElement == null) {
                container.appendChild(dragging);
            } else {
                container.insertBefore(dragging, afterElement);
            }
        });
    }

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.fila-edit-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function reordenarPeloDrag() {
        const itens = [...document.querySelectorAll('.fila-edit-item')];
        fila = itens.map(el => el.innerText.replace('☰', '').split('\n')[0].trim());
        render();
    }

    function mover(i, d) {
        let np = i + d;
        if(np >= 0 && np < fila.length) {
            [fila[i], fila[np]] = [fila[np], fila[i]];
            renderEditor();
            render();
        }
    }

    function remover(i) { fila.splice(i,1); renderEditor(); render(); }
    function fecharFila() { document.getElementById('modal-fila').style.display = 'none'; }
    function addRetardatario() { 
        const v = document.getElementById('add-nome').value; 
        if(v) { fila.push(v); document.getElementById('add-nome').value = ""; render(); }
    }

    // TIMER
    function startT() { if(!tId) tId = setInterval(() => { if(segs>0) { segs--; updT(); } }, 1000); }
    function pauseT() { clearInterval(tId); tId = null; }
    function resetT() { pauseT(); segs = 600; updT(); }
    function updT() {
        let m = Math.floor(segs/60), s = segs%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
    }

    render();
</script>
</body>
</html>
