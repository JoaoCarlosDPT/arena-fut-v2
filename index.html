<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --neon: #00ff88; --dark: #000; --card: #1a1a1a; --border: #333; --blue: #007bff; --red: #dc3545; --gold: #ffcc00; }
        
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; padding-bottom: 140px; box-sizing: border-box; }
        
        /* Telas */
        .page { display: none; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* Card Principal */
        .card { background: var(--card); border-radius: 20px; padding: 15px; width: 100%; max-width: 420px; border-bottom: 4px solid var(--neon); box-sizing: border-box; }

        /* Títulos */
        .main-title { font-size: 2.2rem; font-style: italic; font-weight: 900; margin: 0 0 10px 0; text-align: center; }
        .main-title span { color: var(--neon); }
        .section-title { font-size: 1.1rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; text-align: center; }
        .title-lista { display: flex; align-items: center; gap: 8px; font-weight: bold; margin: 25px 0 15px 0; font-size: 1rem; color: #fff; }

        /* Inputs de Configuração */
        input, textarea, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: #fff; box-sizing: border-box; font-size: 1rem; outline: none; -webkit-appearance: none; }
        .input-group { width: 100%; margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; margin-left: 5px; }

        /* Botão Principal */
        .btn-neon { background: var(--neon); color: #000; padding: 18px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,255,136,0.3); }
        .btn-neon:active { transform: scale(0.96); }

        /* TELA 2: LISTA DE CONVOCAÇÃO (IGUAL À IMAGEM) */
        .checkin-lista { width: 100%; text-align: left; margin-top: 10px; }
        
        /* Contadores de Status */
        .contadores-status { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .status-box { flex: 1; background: rgba(0,255,136,0.05); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .status-box .count { font-size: 2rem; font-weight: bold; color: var(--neon); margin-bottom: 5px; display: block; }
        .status-box .label { font-size: 0.75rem; color: #666; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Cards de Atletas (IDÊNTICO À IMAGEM) */
        .atleta-item { display: flex; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 8px; border: 1px solid #222; gap: 12px; box-sizing: border-box; }
        
        .atleta-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); background: transparent; -webkit-appearance: none; appearance: none; cursor: pointer; }
        .atleta-check:checked { background: var(--neon); border-color: var(--neon); position: relative; }
        .atleta-check:checked::after { content: "✔"; color: #000; position: absolute; left: 3px; top: -1px; font-weight: bold; }

        .atleta-avatar { width: 45px; height: 45px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; overflow: hidden; border: 2px solid #222; }
        
        .atleta-dados { flex: 1; text-align: left; }
        .atleta-nome { font-weight: bold; font-size: 1rem; color: #fff; display: block; margin-bottom: 2px; }
        .atleta-cat { font-size: 0.7rem; color: #fff; font-weight: 900; background: var(--blue); padding: 2px 8px; border-radius: 5px; text-transform: uppercase; }
        .stars { color: var(--gold); font-size: 0.9rem; margin-top: 3px; }

        .atleta-pos { font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; color: var(--gold); background: #222; padding: 5px 10px; border-radius: 8px; }
        .atleta-pos span { font-size: 0.7rem; font-weight: bold; margin-top: 2px; }

        /* RODAPÉ FIXO (IGUAL À IMAGEM) */
        .fixed-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); padding: 15px; border-top: 1px solid #333; z-index: 100; backdrop-filter: blur(10px); }
        .btn-group-check { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-outline { flex: 1; background: transparent; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .resumo-footer { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 12px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div id="wrapper" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        
        <div id="page-config" class="page active card">
            <h1 class="main-title">ARENA<span>FUT</span></h1>
            <p class="section-title">Configurar Pelada</p>
            <div class="input-group">
                <label>Atletas por Time</label>
                <input id="jogadoresPorTime" type="number" placeholder="5">
            </div>
            <button class="btn-neon" style="width:100%" onclick="irTela2()">Avançar →</button>
        </div>

        <div id="page-checkin" class="page">
            <h1 class="main-title">ARENA<span>FUT</span></h1>
            <p class="section-title">Lista de Convocação</p>
            
            <div class="card checkin-lista">
                <div class="contadores-status">
                    <div class="status-box">
                        <span class="count" id="countConf">0</span>
                        <span class="label">CONFIRMADOS</span>
                    </div>
                    <div class="status-box">
                        <span class="count" id="countGols">0</span>
                        <span class="label">GOLEIROS</span>
                    </div>
                </div>

                <div class="title-lista">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm-1.993 15.176l-2.932-2.932 1.414-1.414 1.518 1.518 4.709-4.709 1.414 1.414-6.123 6.123z"></path></svg>
                    Apareceram em Campo
                </div>
                
                <div id="containerCheckinList" style="width: 100%;">
                    <div class="atleta-item">
                        <input type="checkbox" class="atleta-check" checked>
                        <div class="atleta-avatar">⚽</div>
                        <div class="atleta-dados">
                            <span class="atleta-nome">João Silva</span>
                            <span class="atleta-cat">MENSALISTA</span>
                            <div class="stars">★★★★★</div>
                        </div>
                        <div class="atleta-pos">🧤<span>GOLEIRO</span></div>
                    </div>
                    </div>
            </div>
        </div>

    </div>

    <div id="footer-checkin" class="fixed-footer" style="display: none;">
        <div class="btn-group-check">
            <button class="btn-outline">Selecionar Todos</button>
            <button class="btn-outline">Desmarcar Todos</button>
        </div>
        <div class="resumo-footer">TOTAIS: 20 Atletas Conf.</div>
        <button class="btn-neon" style="width: 100%">INICIAR PARTIDA</button>
    </div>

    <script>
        function irTela2() {
            document.getElementById("page-config").classList.remove("active");
            document.getElementById("page-checkin").classList.add("active");
            document.getElementById("footer-checkin").style.display = "block";
        }
    </script>
</body>
</html>
