<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO - Final</title>
    <style>
        :root { --blue: #007bff; --red: #dc3545; --neon: #00ff88; --gold: #ffcc00; --bg: #0c0e11; --card: #15181d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        #app { width: 100%; max-width: 420px; }
        .screen { display: none; flex-direction: column; gap: 12px; }
        .active { display: flex; }
        
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-nav { background: #222; border: 1px solid #444; color: #fff; padding: 5px 12px; border-radius: 8px; cursor: pointer; }

        /* Estilos mantidos para consistência */
        .clock { font-size: 50px; color: var(--gold); font-weight: bold; text-align: center; margin: 10px 0; }
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .score-box { width: 75px; height: 75px; background: #000; border: 2px solid; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: bold; }
        .field { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .team-card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .t-header { padding: 8px; font-size: 10px; font-weight: 900; text-align: center; text-transform: uppercase; color: #fff; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #1c1f24; font-size: 11px; }
        .btn-gol { background: #111; border: 1px solid var(--neon); color: var(--neon); font-size: 9px; padding: 4px 7px; border-radius: 5px; font-weight: bold; }
        .ranking-table { width: 100%; border-collapse: collapse; background: var(--card); font-size: 11px; border-radius: 12px; overflow: hidden; border: 1px solid #222; margin-top: 10px; }
        .ranking-table th, .ranking-table td { padding: 8px; border-bottom: 1px solid #222; text-align: left;}
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:999; }
        .m-content { background: var(--card); width:90%; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); }
        .btn-confirm { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen3" class="screen active">
        <div class="header-nav">
            <button class="btn-nav" onclick="alert('Voltando para Tela 2...')">← Voltar</button>
            <div style="font-size: 12px; color: #666;">TELA 3</div>
        </div>

        <div class="clock" id="timer">10:00</div>
        <div class="scoreboard">
            <div class="score-box" style="border-color:var(--blue); color:var(--blue)" id="s-azul">0</div>
            <div class="score-box" style="border-color:var(--red); color:var(--red)" id="s-red">0</div>
        </div>

        <div class="field" id="field"></div>

        <div class="outcome-row" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <button class="btn-nav" style="border-color:var(--blue); color:var(--blue)" onclick="pedirConfirmacao('Vitória Azul?', () => processarFim('azul'))">V. AZUL</button>
            <button class="btn-nav" style="border-color:var(--red); color:var(--red)" onclick="pedirConfirmacao('Vitória Red?', () => processarFim('red'))">V. RED</button>
            <button class="btn-nav" onclick="pedirConfirmacao('Empate?', () => processarFim('empate'))">EMPATE</button>
        </div>

        <table class="ranking-table">
            <thead><tr><th>ATLETA</th><th>V</th><th>G</th><th>A</th></tr></thead>
            <tbody id="r-body"></tbody>
        </table>

        <button onclick="irParaTela(4)" style="width:100%; padding:15px; background:var(--neon); color:#000; font-weight:bold; border:none; border-radius:10px; margin-top:20px;">FINALIZAR PELADA</button>
    </div>

    <div id="screen4" class="screen">
        <h2 style="text-align:center; color:var(--gold);">Resumo Final</h2>
        <div id="resumo-content" style="background:#15181d; padding:15px; border-radius:15px; color:#fff; font-size:14px;"></div>
        <button onclick="irParaTela(3)" style="margin-top:20px; padding:15px; background:#444; color:#fff; border:none; border-radius:10px;">VOLTAR PARA O JOGO</button>
    </div>
</div>

<div id="modal-confirm" class="modal">
    <div class="m-content" style="text-align:center;">
        <h4 id="confirm-msg">Tem certeza?</h4>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn-confirm" onclick="document.getElementById('modal-confirm').style.display='none'">NÃO</button>
            <button class="btn-confirm" style="background:var(--neon);" id="btn-sim">SIM</button>
        </div>
    </div>
</div>

<div id="modal-assist" class="modal">
    <div class="m-content">
        <h4>Quem deu o passe? 👟</h4>
        <div id="opts"></div>
        <button onclick="gol(null)" style="width:100%; padding:15px; background:#333; color:#fff; border:none; border-radius:10px;">GOL INDIVIDUAL</button>
    </div>
</div>

<script>
    let atletas = [
        { n: "Lucas", t: "azul" }, { n: "Pedro", t: "azul" }, { n: "Mateus", t: "azul" }, { n: "Carlos", t: "azul" }, { n: "Daniel", t: "azul" },
        { n: "Ricardo", t: "red" }, { n: "Silva", t: "red" }, { n: "André", t: "red" }, { n: "Roberto", t: "red" }, { n: "Felipe", t: "red" }
    ];
    let fila = ["Gustavo", "Bruno", "Vinícius", "Henrique", "Fábio", "Tiago", "Leo", "Beto"];
    
    // BANCO DE DADOS GLOBAL
    let estatisticasGlobais = {}; 

    function initStats(nome) {
        if(!estatisticasGlobais[nome]) estatisticasGlobais[nome] = {v:0, g:0, a:0};
    }

    // Inicializar stats iniciais
    atletas.forEach(a => initStats(a.n));

    function irParaTela(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + n).classList.add('active');
        if(n === 4) carregarResumo();
    }

    function pedirConfirmacao(msg, callback) {
        document.getElementById('confirm-msg').innerText = msg;
        document.getElementById('btn-sim').onclick = () => { callback(); document.getElementById('modal-confirm').style.display='none'; };
        document.getElementById('modal-confirm').style.display = 'flex';
    }

    function processarFim(resultado) {
        let timePerdedor = (resultado === 'azul') ? 'red' : ((resultado === 'red') ? 'azul' : null);
        
        if (resultado !== 'empate') {
            // Vencedores ganham vitória
            atletas.filter(a => a.t !== timePerdedor).forEach(a => estatisticasGlobais[a.n].v++);
            // Perdedores vão pra fila
            atletas.filter(a => a.t === timePerdedor).forEach(a => fila.push(a.n));
            atletas = atletas.filter(a => a.t !== timePerdedor);
            rodarFila(timePerdedor);
        } else {
            // Empate: todos pra fila
            atletas.forEach(a => fila.push(a.n));
            atletas = [];
            rodarFila('azul'); rodarFila('red');
        }
        render();
    }

    function rodarFila(time) {
        for(let i=0; i<5; i++) {
            let nome = fila.shift() || "Vaga";
            initStats(nome);
            atletas.push({ n: nome, t: time });
        }
    }

    function gol(assist) {
        initStats(autor);
        estatisticasGlobais[autor].g++;
        if(assist) { initStats(assist); estatisticasGlobais[assist].a++; }
        document.getElementById('modal-assist').style.display = 'none';
        render();
    }

    function render() {
        // Render Campo
        document.getElementById('field').innerHTML = `
            <div class="team-card"><div class="t-header" style="background:var(--blue)">TIME AZUL</div>${atletas.filter(a => a.t === 'azul').map(a => `<div class="row"><span>${a.n}</span><button class="btn-gol" onclick="abrAssist('${a.n}', 'azul')">GOL</button></div>`).join('')}</div>
            <div class="team-card"><div class="t-header" style="background:var(--red)">TIME RED</div>${atletas.filter(a => a.t === 'red').map(a => `<div class="row"><span>${a.n}</span><button class="btn-gol" onclick="abrAssist('${a.n}', 'red')">GOL</button></div>`).join('')}</div>
        `;
        
        // Render Ranking Global
        let ranking = Object.keys(estatisticasGlobais).sort((a,b) => 
            (estatisticasGlobais[b].g + estatisticasGlobais[b].a) - (estatisticasGlobais[a].g + estatisticasGlobais[a].a)
        );
        document.getElementById('r-body').innerHTML = ranking.map(nome => `
            <tr><td>${nome}</td><td>${estatisticasGlobais[nome].v}</td><td>${estatisticasGlobais[nome].g}</td><td>${estatisticasGlobais[nome].a}</td></tr>
        `).join('');
    }

    function carregarResumo() {
        let content = "<h3>Classificação Final</h3>";
        Object.keys(estatisticasGlobais).forEach(n => {
            content += `<p>${n}: ${estatisticasGlobais[n].v} Vitórias | ${estatisticasGlobais[n].g} Gols</p>`;
        });
        document.getElementById('resumo-content').innerHTML = content;
    }

    function abrAssist(n, t) { autor = n; const opts = document.getElementById('opts'); opts.innerHTML = atletas.filter(a => a.t === t && a.n !== n).map(c => `<button onclick="gol('${c.n}')" style="width:100%; padding:10px; margin:5px 0; background:#222; color:#fff; border-radius:10px;">${c.n}</button>`).join(''); document.getElementById('modal-assist').style.display = 'flex'; }

    render();
</script>
</body>
</html>
