<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Fut PRO FULL</title>

<style>
/* ====== (SEU CSS ORIGINAL MANTIDO 100%) ====== */
:root { --neon:#00ff88; --dark:#000; --card:#1a1a1a; --border:#333; --blue:#007bff; --red:#dc3545; --gold:#ffcc00; }

body { background: var(--dark); color:#fff; font-family:'Segoe UI'; margin:0; padding:10px; }

.hidden{display:none}

/* REAPROVEITANDO TODOS SEUS ESTILOS (sem alteração visual) */
.card{background:#1a1a1a;padding:15px;border-radius:16px;margin-bottom:12px;border:1px solid #333}
.btn-neon{background:var(--neon);color:#000;padding:15px;width:100%;border-radius:12px;border:none;font-weight:bold}
input,select,textarea{width:100%;height:48px;background:#111;color:#fff;border:1px solid #333;border-radius:12px;padding:10px}
.row{display:flex;gap:10px;margin-bottom:10px}
.col{flex:1}

/* ===== TELA 3 ESTILO ===== */
#app{max-width:420px;margin:auto}
.screen{display:none}
.screen.active{display:block}

.clock{font-size:50px;text-align:center;color:var(--gold)}
.scoreboard{display:flex;justify-content:center;gap:20px}
.score-box{width:70px;height:70px;background:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:40px}

</style>
</head>

<body>

<!-- ================= TELA 1 ================= -->
<div id="tela1">
<div class="card">
<h3 id="txt-saudacao"></h3>

<input id="nomeEvento" placeholder="Nome da pelada">
<input id="local" placeholder="Local">

<div class="row">
<input id="dataEv" type="date">
<input id="horarioEv" type="time">
</div>

<div class="row">
<input id="limite" type="number" placeholder="Limite">
<input id="jogadoresPorTime" type="number" placeholder="Por time">
</div>

<button class="btn-neon" onclick="irTela2()">CONVOCAR →</button>
</div>
</div>

<!-- ================= TELA 2 ================= -->
<div id="tela2" class="hidden">
<div class="card">
<textarea id="listaTexto" placeholder="Cole atletas"></textarea>
<button class="btn-neon" onclick="processarLista()">PROCESSAR</button>
</div>

<div id="listaArea"></div>

<button class="btn-neon" onclick="irTela3()">IR PRO JOGO →</button>
</div>

<!-- ================= TELA 3 ================= -->
<div id="tela3" class="hidden">
<div id="app">

<div class="screen active">

<div class="clock" id="timer">10:00</div>

<div class="scoreboard">
<div class="score-box" id="s-azul">0</div>
<div class="score-box" id="s-red">0</div>
</div>

<div id="field"></div>

</div>

</div>
</div>

<script>

/* ===== SAUDAÇÃO ===== */
const frases = [
"Fala João!",
"Hoje tem jogo pesado!",
"Preparado pra organizar?"
];

document.getElementById('txt-saudacao').innerText =
frases[Math.floor(Math.random()*frases.length)];

/* ===== TELA FLOW ===== */
function irTela2(){
tela1.classList.add('hidden');
tela2.classList.remove('hidden');
}

function irTela3(){
tela2.classList.add('hidden');
tela3.classList.remove('hidden');
iniciarJogo();
}

/* ===== DADOS ===== */
let atletasApp = [];

/* ===== PROCESSAR LISTA ===== */
function processarLista(){
let texto = listaTexto.value.split('\n');

atletasApp = texto.map((nome,i)=>({
n:nome.trim(),
t: i%2==0 ? 'azul':'red',
v:0,g:0,a:0,active:true
}));

renderLista();
}

/* ===== RENDER LISTA ===== */
function renderLista(){
listaArea.innerHTML = atletasApp.map(a=>`
<div>${a.n}</div>
`).join('');
}

/* ===== JOGO ===== */
let sAzul=0,sRed=0;

function iniciarJogo(){
renderCampo();
}

function renderCampo(){
field.innerHTML = `
<h3>Time Azul</h3>
${atletasApp.filter(a=>a.t=='azul').map(a=>`
<div>${a.n} <button onclick="gol('${a.n}','azul')">⚽</button></div>
`).join('')}

<h3>Time Red</h3>
${atletasApp.filter(a=>a.t=='red').map(a=>`
<div>${a.n} <button onclick="gol('${a.n}','red')">⚽</button></div>
`).join('')}
`;
}

/* ===== GOL ===== */
function gol(nome,time){
if(time=='azul') sAzul++;
else sRed++;

document.getElementById('s-azul').innerText=sAzul;
document.getElementById('s-red').innerText=sRed;
}

/* ===== TIMER ===== */
let segs=600;
setInterval(()=>{
let m=Math.floor(segs/60);
let s=segs%60;
timer.innerText=`${m}:${s<10?'0':''}${s}`;
if(segs>0) segs--;
},1000);

</script>

</body>
</html>
