<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO V2 - Gestão Total</title>
    <style>
        :root { --neon: #00ff88; --dark: #000; --card: #1a1a1a; --border: #333; --blue: #007bff; --red: #dc3545; --gold: #ffcc00; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .hidden { display: none; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        
        /* ESTILOS TELA 3 */
        .header-jogo { text-align: center; padding: 20px 0; }
        .cronometro { font-size: 4rem; color: var(--gold); font-weight: 900; text-shadow: 0 0 15px rgba(255,204,0,0.4); margin-bottom: 10px; }
        .controles-tempo { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .btn-tempo { background: #222; color: #fff; width: 50px; height: 50px; border-radius: 50%; font-size: 20px; border: 1px solid #444; }
        
        .progresso-container { width: 100%; height: 6px; background: #222; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progresso-bar { height: 100%; width: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 0.1s linear; }

        .placar-container { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 30px; }
        .placar-box { width: 80px; height: 80px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; border: 2px solid transparent; }
        .placar-azul { border-color: var(--blue); color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .placar-red { border-color: var(--red); color: var(--red); text-shadow: 0 0 10px var(--red); }

        .campo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .time-card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid #333; }
        .time-header { text-align: center; font-weight: 900; padding: 5px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8rem; text-transform: uppercase; }
        .atleta-jogo { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .atleta-info { display: flex; align-items: center; gap: 5px; overflow: hidden; }
        .btn-gol { background: var(--neon); color: #000; font-size: 10px; padding: 4px 8px; border-radius: 5px; }
        .btn-troca { background: transparent; color: #666; font-size: 16px; padding: 0 5px; }

        .timeline { background: #0a0a0a; border-radius: 12px; padding: 15px; height: 120px; overflow-y: auto; border: 1px solid #222; margin-bottom: 20px; }
        .log-item { font-size: 12px; margin-bottom: 5px; color: #aaa; border-left: 2px solid #444; padding-left: 8px; }

        .fila-section { background: rgba(0,255,136,0.05); border: 1px solid var(--neon); border-radius: 12px; padding: 12px; margin-bottom: 80px; }
        .fila-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-edit-fila { font-size: 10px; color: var(--gold); border: 1px solid var(--gold); background: transparent; padding: 4px 8px; }

        .footer-controles { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        .btn-resultado { flex: 1; padding: 15px; font-size: 12px; text-transform: uppercase; }

        /* MODAL ASSISTÊNCIA */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 20px; width: 80%; border: 1px solid var(--neon); }
        .btn-assist { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #222; color: #fff; text-align: left; }
    </style>
</head>
<body>

    <div id="tela3">
        <div class="header-jogo">
            <div id="relogio" class="cronometro">10:00</div>
            <div class="controles-tempo">
                <button class="btn-tempo" onclick="controlarTempo('start')">▶</button>
                <button class="btn-tempo" onclick="controlarTempo('pause')">⏸</button>
                <button class="btn-tempo" onclick="controlarTempo('reset')">↺</button>
            </div>
            <div class="progresso-container">
                <div id="barraProgresso" class="progresso-bar"></div>
            </div>
        </div>

        <div class="placar-container">
            <div id="placarAzul" class="placar-box placar-azul">0</div>
            <div style="font-size: 20px; color: #444;">VS</div>
            <div id="placarRed" class="placar-box placar-red">0</div>
        </div>

        <div class="campo-grid">
            <div class="time-card">
                <div class="time-header" style="background: var(--blue);">Time Azul</div>
                <div id="jogadoresAzul"></div>
            </div>
            <div class="time-card">
                <div class="time-header" style="background: var(--red);">Time Red</div>
                <div id="jogadoresRed"></div>
            </div>
        </div>

        <div class="timeline" id="logPartida">
            <div class="log-item">Partida iniciada. Boa sorte!</div>
        </div>

        <div class="fila-section">
            <div class="fila-header">
                <span style="font-size: 12px; font-weight: bold; color: var(--neon);">PRÓXIMOS (FILA)</span>
                <button class="btn-edit-fila" onclick="alert('Modo Edição de Fila Ativado')">EDITAR FILA ✏️</button>
            </div>
            <div id="listaFira" style="font-size: 11px; color: #888;">Ninguém na espera...</div>
            <div style="margin-top: 15px; display: flex; gap: 5px;">
                <input type="text" id="nomeAtrasado" placeholder="Nome do atrasado..." style="flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 8px; font-size: 12px;">
                <button onclick="adicionarAtrasado()" style="background: var(--neon); color: #000; padding: 0 15px; border-radius: 8px;">+</button>
            </div>
        </div>

        <div class="footer-controles">
            <button class="btn-resultado" style="border: 1px solid var(--blue); color: var(--blue); background: transparent;" onclick="fimPartida('azul')">VITÓRIA AZUL</button>
            <button class="btn-resultado" style="border: 1px solid var(--red); color: var(--red); background: transparent;" onclick="fimPartida('red')">VITÓRIA RED</button>
            <button class="btn-resultado" style="background: #333; color: #fff;" onclick="fimPartida('empate')">EMPATE</button>
        </div>
    </div>

    <div id="modalAssist" class="modal hidden">
        <div class="modal-content">
            <h4 style="margin-top:0; color: var(--neon);">Quem deu o passe?</h4>
            <div id="opcoesAssist"></div>
            <button class="btn-assist" style="background: var(--neon); color: #000; text-align: center; font-weight: bold;" onclick="registrarGol(null)">GOL INDIVIDUAL (SEM ASSIST.)</button>
        </div>
    </div>

    <script>
        // DADOS PARA TESTE DIRETO (TELA 1 E 2 PREENCHIDAS)
        let tempoTotal = 10 * 60;
        let tempoRestante = tempoTotal;
        let timerInterval;
        let golsAzul = 0, golsRed = 0;
        let autorGolAtual = null, timeGolAtual = null;

        let atletas = [
            { id: 0, nome: "João Silva", pos: "G", img: "🧤", emCampo: true, time: "azul" },
            { id: 1, nome: "Ricardo P.", pos: "A", img: "👟", emCampo: true, time: "azul" },
            { id: 2, nome: "Mateus A.", pos: "A", img: "👟", emCampo: true, time: "azul" },
            { id: 3, nome: "Carlos", pos: "A", img: "👟", emCampo: true, time: "azul" },
            { id: 4, nome: "Daniel", pos: "A", img: "👟", emCampo: true, time: "azul" },
            { id: 5, nome: "Ricardo G.", pos: "G", img: "🧤", emCampo: true, time: "red" },
            { id: 6, nome: "Silva", pos: "A", img: "👟", emCampo: true, time: "red" },
            { id: 7, nome: "Andre", pos: "A", img: "👟", emCampo: true, time: "red" },
            { id: 8, nome: "Roberto", pos: "A", img: "👟", emCampo: true, time: "red" },
            { id: 9, nome: "Felipe", pos: "A", img: "👟", emCampo: true, time: "red" },
            { id: 10, nome: "Gustavo", emCampo: false }, { id: 11, nome: "Bruno", emCampo: false },
            { id: 12, nome: "Vinícius", emCampo: false }, { id: 13, nome: "Henrique", emCampo: false }
        ];

        function renderizarPartida() {
            const containerAzul = document.getElementById('jogadoresAzul');
            const containerRed = document.getElementById('jogadoresRed');
            const containerFila = document.getElementById('listaFira');

            containerAzul.innerHTML = ""; containerRed.innerHTML = ""; containerFila.innerHTML = "";

            atletas.forEach(atleta => {
                if(atleta.emCampo) {
                    const html = `
                        <div class="atleta-jogo">
                            <div class="atleta-info">
                                <span>${atleta.img}</span>
                                <span style="white-space:nowrap">${atleta.nome.split(' ')[0]}</span>
                            </div>
                            <div style="display:flex; gap:4px">
                                <button class="btn-gol" onclick="abrirModalAssist(${atleta.id}, '${atleta.time}')">GOL</button>
                                <button class="btn-troca" onclick="trocaEmergencia(${atleta.id})">🔄</button>
                            </div>
                        </div>`;
                    atleta.time === "azul" ? containerAzul.innerHTML += html : containerRed.innerHTML += html;
                } else {
                    containerFila.innerHTML += atleta.nome + ", ";
                }
            });
        }

        function controlarTempo(acao) {
            if(acao === 'start') {
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    if(tempoRestante <= 0) return clearInterval(timerInterval);
                    tempoRestante--;
                    atualizarRelogio();
                }, 1000);
            } else if(acao === 'pause') clearInterval(timerInterval);
            else {
                tempoRestante = tempoTotal;
                atualizarRelogio();
            }
        }

        function atualizarRelogio() {
            const m = Math.floor(tempoRestante / 60);
            const s = tempoRestante % 60;
            document.getElementById('relogio').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            document.getElementById('barraProgresso').style.width = (tempoRestante / tempoTotal * 100) + "%";
        }

        function abrirModalAssist(id, time) {
            autorGolAtual = id; timeGolAtual = time;
            const container = document.getElementById('opcoesAssist');
            container.innerHTML = "";
            atletas.filter(a => a.emCampo && a.time === time && a.id !== id).forEach(p => {
                container.innerHTML += `<button class="btn-assist" onclick="registrarGol(${p.id})">👟 Passe de ${p.nome}</button>`;
            });
            document.getElementById('modalAssist').classList.remove('hidden');
        }

        function registrarGol(assistId) {
            const autor = atletas.find(a => a.id === autorGolAtual);
            const assist = assistId !== null ? atletas.find(a => a.id === assistId) : null;
            const min = Math.floor((tempoTotal - tempoRestante) / 60);

            if(timeGolAtual === 'azul') golsAzul++; else golsRed++;
            
            document.getElementById('placarAzul').innerText = golsAzul;
            document.getElementById('placarRed').innerText = golsRed;

            const log = document.getElementById('logPartida');
            log.innerHTML = `<div class="log-item" style="color:var(--neon)">[${min}'] ⚽ ${autor.nome} ${assist ? '(👟 '+assist.nome+')' : ''}</div>` + log.innerHTML;
            
            document.getElementById('modalAssist').classList.add('hidden');
        }

        function adicionarAtrasado() {
            const nome = document.getElementById('nomeAtrasado').value;
            if(!nome) return;
            atletas.push({ id: atletas.length, nome: nome, emCampo: false });
            document.getElementById('nomeAtrasado').value = "";
            renderizarPartida();
        }

        function trocaEmergencia(idSai) {
            const proximo = atletas.find(a => !a.emCampo);
            if(!proximo) return alert("Ninguém na fila!");
            
            const saindo = atletas.find(a => a.id === idSai);
            proximo.emCampo = true; proximo.time = saindo.time; proximo.pos = "A"; proximo.img = "👟";
            saindo.emCampo = false;
            
            const log = document.getElementById('logPartida');
            log.innerHTML = `<div class="log-item">[🔄] Saiu: ${saindo.nome} / Entrou: ${proximo.nome}</div>` + log.innerHTML;
            renderizarPartida();
        }

        function fimPartida(resultado) {
            alert("Fim de partida! Lógica de giro de times seria aplicada aqui.");
            location.reload(); // Apenas para resetar o teste
        }

        renderizarPartida();
        atualizarRelogio();
    </script>
</body>
</html>
