<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --neon: #00ff88; --dark: #000; --card: #1a1a1a; --border: #333; --blue: #007bff; --red: #dc3545; --gold: #ffcc00; --gray: #888; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; padding-bottom: 100px; }
        button { border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        
        /* INPUTS PADRONIZADOS */
        .input-group { margin-bottom: 15px; width: 100%; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .col { flex: 1; }
        label { font-size: 0.65rem; color: var(--neon); font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 6px; margin-left: 5px; }
        
        input, textarea, select { 
            width: 100%; height: 48px; padding: 0 12px; border-radius: 12px; border: 1px solid var(--border); 
            background: #111; color: #fff; box-sizing: border-box; font-size: 14px; outline: none; 
            -webkit-appearance: none; appearance: none;
        }
        textarea { height: auto; padding: 12px; }

        /* CARDS E BOTÕES */
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); box-sizing: border-box; }
        .btn-neon { background: var(--neon); color: #000; padding: 15px; width: 100%; font-size: 1rem; }
        .btn-ghost { background: transparent; border: 1px solid #444; color: #aaa; padding: 10px; font-size: 10px; flex: 1; }
        
        /* ESTILO LISTA TELA 2 */
        .atleta-card { 
            display: flex; align-items: center; background: #111; padding: 10px; 
            border-radius: 14px; margin-bottom: 8px; border: 1px solid #222; gap: 10px;
        }
        .atleta-info { flex: 1; }
        .atleta-nome { font-size: 14px; font-weight: bold; display: block; margin-bottom: 2px; }
        .tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 900; text-transform: uppercase; margin-right: 5px; }
        .tag-mensalista { background: var(--neon); color: #000; }
        .tag-convidado { background: var(--blue); color: #fff; }
        
        .estrelas { color: var(--gold); font-size: 12px; margin-top: 4px; }
        .posicao-seletor { background: #222; color: var(--gold); border: 1px solid #333; border-radius: 8px; font-size: 10px; padding: 5px; width: 45px; text-align: center; }

        .resumo-fixed { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #000; 
            padding: 15px; border-top: 1px solid #333; z-index: 100;
        }
        .stats-bolhas { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; font-size: 11px; color: #aaa; }
        .stats-bolhas b { color: var(--neon); }
    </style>
</head>
<body>

    <div id="tela1" class="card" style="border-top: 5px solid var(--neon);">
        <div id="saudacao-container" style="margin-bottom: 25px; background: rgba(0,255,136,0.05); padding: 15px; border-radius: 12px; border: 1px solid #222;">
            <h3 id="txt-saudacao" style="color: var(--neon); margin: 0; font-size: 1.1rem;">Carregando...</h3>
            <p style="color: #666; font-size: 0.75rem; margin-top: 5px; font-weight: bold; text-transform: uppercase;">🎮 Gestão de Arena</p>
        </div>

        <div class="input-group"><label>Nome da Pelada</label><input id="nomeEvento" placeholder="Ex: Pelada dos Amigos"></div>
        <div class="input-group"><label>Local da Arena</label><input id="local" placeholder="Ex: Arena Soccer X"></div>

        <div class="row">
            <div class="col" style="flex: 1.4;"><label>Data</label><input id="dataEv" type="date"></div>
            <div class="col"><label>Horário</label><input id="horarioEv" type="time"></div>
        </div>

        <div class="row">
            <div class="col"><label>Atletas/Time</label><input id="jogadoresPorTime" type="number" placeholder="5"></div>
            <div class="col"><label>Tempo (Min)</label><input id="tempoRegra" type="number" placeholder="10"></div>
        </div>

        <button class="btn-neon" onclick="irTela2()">CONVOCAR ATLETAS →</button>
    </div>

    <div id="tela2" style="display:none">
        <div class="card" style="margin-bottom: 10px;">
            <label>Cole a lista aqui (Nome e Categoria)</label>
            <textarea id="listaTexto" rows="4" placeholder="1. João (M)&#10;2. Pedro (C)&#10;3. Ricardo (M)"></textarea>
            <button class="btn-neon" style="margin-top: 10px; height: 40px; font-size: 12px;" onclick="processarLista()">PROCESSAR LISTA ⚡</button>
        </div>

        <div id="areaCheckin" style="display:none">
            <div id="listaAtletasRender" style="margin-top: 15px;">
                </div>

            <div class="row" style="margin-top: 20px;">
                <button class="btn-ghost" onclick="massa(true)">MARCAR TODOS</button>
                <button class="btn-ghost" onclick="massa(false)">DESMARCAR TODOS</button>
            </div>
        </div>

        <div class="resumo-fixed" id="rodapeAcao" style="display:none">
            <div class="stats-bolhas">
                <span>CONFIRMADOS: <b id="totalConf">0</b></span>
                <span>GOLEIROS: <b id="totalGol">0</b></span>
            </div>
            <button class="btn-neon" onclick="iniciarJogo()">INICIAR PARTIDA ⚽</button>
        </div>
    </div>

    <script>
        // Configuração Firebase (Mesma de antes)
        const firebaseConfig = { apiKey: "AIzaSyCwi7wNRm-0Zg8W1sXVOFy-1EnGHjXyUCg", projectId: "arena-fut-f1599" };
        firebase.initializeApp(firebaseConfig);
        
        let app = { atletas: [] };

        const frases = ["Fala, João! Preparado para o show?", "E aí, João! Quem vai ser o MVP hoje?"];
        window.onload = () => { document.getElementById('txt-saudacao').innerText = frases[Math.floor(Math.random() * frases.length)]; };

        function irTela2() { document.getElementById("tela1").style.display="none"; document.getElementById("tela2").style.display="block"; }

        function processarLista() {
            let texto = document.getElementById("listaTexto").value;
            let linhas = texto.split("\n").filter(l => l.trim() !== "");
            
            app.atletas = linhas.map((linha, i) => {
                let nomeLimpo = linha.replace(/^\d+[\s.-]*/, '').trim();
                let categoria = "Convidado";
                if(nomeLimpo.toUpperCase().includes("(M)")) { categoria = "Mensalista"; nomeLimpo = nomeLimpo.replace(/\(M\)/gi, '').trim(); }
                if(nomeLimpo.toUpperCase().includes("(T)")) { categoria = "Mensalista"; nomeLimpo = nomeLimpo.replace(/\(T\)/gi, '').trim(); }
                
                return { 
                    id: i, nome: nomeLimpo, cat: categoria, conf: true, estrelas: 3, pos: "A" 
                };
            });

            document.getElementById("areaCheckin").style.display = "block";
            document.getElementById("rodapeAcao").style.display = "block";
            renderLista();
        }

        function renderLista() {
            let html = app.atletas.map(atleta => `
                <div class="atleta-card" style="opacity: ${atleta.conf ? 1 : 0.5}">
                    <input type="checkbox" ${atleta.conf ? 'checked' : ''} onchange="toggle(${atleta.id})" style="width:20px; height:20px">
                    
                    <div class="atleta-info">
                        <span class="atleta-nome">${atleta.nome}</span>
                        <div>
                            <span class="tag ${atleta.cat === 'Mensalista' ? 'tag-mensalista' : 'tag-convidado'}">${atleta.cat}</span>
                            <span class="estrelas" onclick="mudarEstrela(${atleta.id})">${'★'.repeat(atleta.estrelas)}${'☆'.repeat(5-atleta.estrelas)}</span>
                        </div>
                    </div>

                    <select class="posicao-seletor" onchange="mudarPos(${atleta.id}, this.value)">
                        <option value="A" ${atleta.pos === 'A' ? 'selected' : ''}>Linha</option>
                        <option value="G" ${atleta.pos === 'G' ? 'selected' : ''}>GOL</option>
                    </select>
                </div>
            `).join('');
            
            document.getElementById("listaAtletasRender").innerHTML = html;
            atualizarResumo();
        }

        function toggle(id) { app.atletas[id].conf = !app.atletas[id].conf; renderLista(); }
        
        function mudarEstrela(id) { 
            app.atletas[id].estrelas = app.atletas[id].estrelas >= 5 ? 1 : app.atletas[id].estrelas + 1;
            renderLista();
        }

        function mudarPos(id, val) { app.atletas[id].pos = val; atualizarResumo(); }

        function massa(val) { app.atletas.forEach(a => a.conf = val); renderLista(); }

        function atualizarResumo() {
            let confs = app.atletas.filter(a => a.conf);
            document.getElementById("totalConf").innerText = confs.length;
            document.getElementById("totalGol").innerText = confs.filter(a => a.pos === 'G').length;
        }

        function iniciarJogo() {
            alert("Partida Iniciada com " + app.atletas.filter(a => a.conf).length + " atletas!");
            // Aqui chamaria a Tela 3 (Cronômetro)
        }
    </script>
</body>
</html>
