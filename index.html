<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Fut PRO - Teste Funcional V2</title>
    <style>
        :root { --blue: #3a86ff; --red: #ff4d4d; --neon: #00ff88; --gold: #ffcc00; --bg: #0c0e11; --card: #15181d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 400px; background: #1a1d21; border-radius: 30px; padding: 20px; box-shadow: 0 10px 30px #000; }
        
        /* TIMER E PLACAR */
        .clock { font-size: 60px; text-align: center; color: var(--gold); font-weight: bold; margin: 10px 0; }
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .score-box { width: 70px; height: 70px; background: #000; border: 2px solid; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; }
        
        /* FIELD PANEL */
        .field { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .team-card { background: var(--card); border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .t-header { padding: 8px; font-size: 10px; font-weight: bold; text-align: center; }
        .row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 12px; }
        .btn-gol { background: transparent; border: 1px solid var(--neon); color: var(--neon); font-size: 9px; padding: 3px 6px; border-radius: 4px; cursor: pointer; }

        /* RANKING */
        .ranking-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; font-size: 11px; margin-top: 15px; border: 1px solid #333; }
        .ranking-table th { background: #222; padding: 8px; text-align: left; color: var(--text-muted); }
        .ranking-table td { padding: 8px; border-bottom: 1px solid #222; }

        /* MODAL */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:100; }
        .modal-content { background: var(--card); width:80%; padding:20px; border-radius:15px; border: 1px solid var(--neon); }
        .assist-btn { display:block; width:100%; padding:12px; margin:8px 0; background:#222; color:#fff; border:1px solid #444; border-radius:8px; text-align:center; }

        /* NEXT SECTION */
        .next-card { border: 2px solid var(--neon); padding: 15px; border-radius: 12px; margin: 20px 0; }
        .next-card h4 { color: var(--neon); margin: 0 0 5px 0; font-size: 12px; }
        .next-list { font-size: 10px; color: #888; line-height: 1.4; }
    </style>
</head>
<body>

<div id="app">
    <div class="clock" id="timer">10:00</div>
    
    <div class="scoreboard">
        <div class="score-box" style="border-color: var(--blue); color: var(--blue);" id="s-azul">0</div>
        <div class="score-box" style="border-color: var(--red); color: var(--red);" id="s-red">0</div>
    </div>

    <div class="field" id="field"></div>

    <div id="log" style="height: 60px; overflow-y: auto; font-size: 11px; color: #777; margin-bottom: 10px;"></div>

    <div class="next-card">
        <div style="display:flex; justify-content:space-between">
            <h4>PRÓXIMOS (FILA)</h4>
            <button onclick="alert('Modo edição de fila ativado!')" style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:9px; border-radius:4px; padding:2px 5px;">EDITAR FILA</button>
        </div>
        <div class="next-list" id="fila-lista"></div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom: 15px;">
        <input type="text" id="add-nome" placeholder="Nome do atrasado..." style="flex:1; background:#111; border:1px solid #333; color:#fff; border-radius:5px; padding:8px;">
        <button onclick="adicionarAtrasado()" style="background:var(--neon); border:none; padding:0 15px; border-radius:5px; font-weight:bold;">+</button>
    </div>

    <table class="ranking-table">
        <thead><tr><th>ATLETA</th><th>V</th><th>G</th><th>A</th></tr></thead>
        <tbody id="ranking-body"></tbody>
    </table>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h4 style="text-align:center; margin-top:0">Quem deu a assistência?</h4>
        <div id="assist-options"></div>
        <button class="assist-btn" style="color:var(--text-muted)" onclick="confirmarGol(null)">SEM ASSISTÊNCIA</button>
    </div>
</div>

<script>
    // --- TELA 1 E 2 PREENCHIDAS (3,5 TIMES = 18 JOGADORES) ---
    let atletas = [
        { nome: "Lucas", pos: "G", v: 2, g: 0, a: 0, time: "azul" },
        { nome: "Pedro", pos: "A", v: 2, g: 3, a: 1, time: "azul" },
        { nome: "Mateus", pos: "A", v: 2, g: 1, a: 2, time: "azul" },
        { nome: "Carlos", pos: "A", v: 1, g: 0, a: 1, time: "azul" },
        { nome: "Daniel", pos: "A", v: 1, g: 0, a: 0, time: "azul" },
        { nome: "Ricardo", pos: "G", v: 0, g: 0, a: 0, time: "red" },
        { nome: "Silva", pos: "A", v: 0, g: 2, a: 0, time: "red" },
        { nome: "André", pos: "A", v: 0, g: 0, a: 0, time: "red" },
        { nome: "Roberto", pos: "A", v: 0, g: 0, a: 1, time: "red" },
        { nome: "Felipe", pos: "A", v: 0, g: 1, a: 0, time: "red" }
    ];

    let fila = ["Gustavo", "Bruno", "Vinícius", "Henrique", "Fábio", "Tiago", "Leo", "Beto"];
    let placarAzul = 0, placarRed = 0;
    let autorId = null;

    function renderField() {
        const field = document.getElementById('field');
        const times = ['azul', 'red'];
        field.innerHTML = times.map(t => `
            <div class="team-card">
                <div class="t-header" style="background:var(--${t === 'azul' ? 'blue' : 'red'})">TIME ${t.toUpperCase()}</div>
                ${atletas.filter(a => a.time === t).map(a => `
                    <div class="row">
                        <span><b>${a.pos}</b> ${a.nome}</span>
                        <button class="btn-gol" onclick="abrirAssist('${a.nome}', '${t}')">GOL</button>
                    </div>
                `).join('')}
            </div>
        `).join('');
        renderRanking();
        renderFila();
    }

    function abrirAssist(nome, time) {
        autorId = nome;
        const container = document.getElementById('assist-options');
        const colegas = atletas.filter(a => a.time === time && a.nome !== nome);
        container.innerHTML = colegas.map(c => `<button class="assist-btn" onclick="confirmarGol('${c.nome}')">${c.nome}</button>`).join('');
        document.getElementById('modal').style.display = 'flex';
    }

    function confirmarGol(assistente) {
        const autor = atletas.find(a => a.nome === autorId);
        autor.g++;
        if(assistente) {
            const ass = atletas.find(a => a.nome === assistente);
            ass.a++;
        }
        
        if(autor.time === 'azul') placarAzul++; else placarRed++;
        
        document.getElementById('s-azul').innerText = placarAzul;
        document.getElementById('s-red').innerText = placarRed;
        document.getElementById('modal').style.display = 'none';
        
        document.getElementById('log').innerHTML = `[${document.getElementById('timer').innerText}] ⚽ Gol: ${autorId} ${assistente ? '(👟 Assist: '+assistente+')' : ''}<br>` + document.getElementById('log').innerHTML;
        renderRanking();
    }

    function renderRanking() {
        const body = document.getElementById('ranking-body');
        const sorted = [...atletas].sort((a,b) => (b.g + b.a) - (a.g + a.a));
        body.innerHTML = sorted.map(a => `<tr><td>${a.nome}</td><td>${a.v}</td><td>${a.g}</td><td>${a.a}</td></tr>`).join('');
    }

    function renderFila() {
        document.getElementById('fila-lista').innerText = "ESPERA: " + fila.join(", ");
    }

    function adicionarAtrasado() {
        const nome = document.getElementById('add-nome').value;
        if(nome) {
            fila.push(nome);
            document.getElementById('add-nome').value = "";
            renderFila();
        }
    }

    renderField();
</script>

</body>
</html>
