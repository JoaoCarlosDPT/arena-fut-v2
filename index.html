<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO - Final</title>
    <style>
        :root { --blue: #007bff; --red: #dc3545; --neon: #00ff88; --gold: #ffcc00; --bg: #0c0e11; --card: #15181d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; overflow-x: hidden; }
        #app { width: 100%; max-width: 420px; background: linear-gradient(180deg, #1a1d21 0%, #0c0e11 100%); border-radius: 35px; padding: 15px; border: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        
        /* HEADER & TIMER */
        .clock-section { text-align: center; }
        .clock { font-size: clamp(50px, 15vw, 70px); color: var(--gold); font-weight: bold; text-shadow: 0 0 20px rgba(255,204,0,0.3); margin: 5px 0; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .btn-c { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333; background: #222; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* SCOREBOARD */
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .score-box { width: 75px; height: 75px; background: #000; border: 2px solid; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: bold; }

        /* FIELD PANEL */
        .field { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .team-card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .t-header { padding: 8px; font-size: 10px; font-weight: 900; text-align: center; text-transform: uppercase; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #1c1f24; font-size: 11px; }
        .btn-gol { background: #111; border: 1px solid var(--neon); color: var(--neon); font-size: 9px; padding: 4px 7px; border-radius: 5px; font-weight: bold; }

        /* LOGS LADO A LADO */
        .logs-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 10px; min-height: 80px; }
        .log-col { font-size: 10px; color: #888; }
        .log-header { font-size: 9px; font-weight: 900; color: #444; text-align: center; margin-bottom: 5px; }
        .log-item { margin-bottom: 4px; border-left: 2px solid #333; padding-left: 5px; }

        /* FILA & RANKING */
        .fila-box { border: 2px solid var(--neon); border-radius: 15px; padding: 12px; }
        .fila-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .next-list { font-size: 10px; color: #aaa; line-height: 1.4; }
        
        .ranking-table { width: 100%; border-collapse: collapse; background: var(--card); font-size: 11px; border-radius: 10px; overflow: hidden; }
        .ranking-table th { background: #222; padding: 6px; color: #666; text-align: left; }
        .ranking-table td { padding: 6px; border-bottom: 1px solid #222; }

        /* BOTTOM BUTTONS */
        .bottom-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-out { background: var(--card); border: 1px solid #222; color: #fff; padding: 12px 5px; border-radius: 10px; font-weight: bold; font-size: 10px; cursor: pointer; }

        /* MODAL */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:999; }
        .m-content { background: var(--card); width:85%; padding:20px; border-radius:20px; border: 1px solid var(--neon); }
        .opt { display:block; width:100%; padding:15px; margin:10px 0; background:#222; border:1px solid #444; color:#fff; border-radius:10px; text-align:center; font-weight:bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="clock-section">
        <div class="clock" id="timer">10:00</div>
        <div class="controls">
            <button class="btn-c" onclick="startT()">▶</button>
            <button class="btn-c" onclick="pauseT()">Ⅱ</button>
            <button class="btn-c" onclick="resetT()">↺</button>
        </div>
    </div>

    <div class="scoreboard">
        <div class="score-box" style="border-color:var(--blue); color:var(--blue)" id="s-azul">0</div>
        <div class="score-box" style="border-color:var(--red); color:var(--red)" id="s-red">0</div>
    </div>

    <div class="field" id="field"></div>

    <div class="logs-container">
        <div><div class="log-header" style="color:var(--blue)">AZUL LOG</div><div id="l-azul"></div></div>
        <div><div class="log-header" style="color:var(--red)">RED LOG</div><div id="l-red"></div></div>
    </div>

    <div class="fila-box">
        <div class="fila-header">
            <span style="color:var(--neon); font-weight:900; font-size:11px">PRÓXIMOS (FILA)</span>
            <button onclick="editarFila()" style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:9px; padding:3px 7px; border-radius:5px;">EDITAR FILA 🖊️</button>
        </div>
        <div class="next-list" id="fila-lista"></div>
    </div>

    <table class="ranking-table">
        <thead><tr><th>ATLETA</th><th>V</th><th>G</th><th>A</th></tr></thead>
        <tbody id="r-body"></tbody>
    </table>

    <div class="bottom-row">
        <button class="btn-out" style="border-color:var(--blue); color:var(--blue)" onclick="fim('AZUL')">VITÓRIA AZUL</button>
        <button class="btn-out" style="border-color:var(--red); color:var(--red)" onclick="fim('RED')">VITÓRIA RED</button>
        <button class="btn-out" onclick="fim('EMPATE')">EMPATE</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="m-content">
        <h4 style="text-align:center; margin-top:0">Quem deu o passe? 👟</h4>
        <div id="opts"></div>
        <button class="opt" style="color:#666" onclick="gol(null)">GOL INDIVIDUAL</button>
    </div>
</div>

<script>
    // --- DADOS INICIAIS (18 JOGADORES) ---
    let atletas = [
        { n: "Lucas", p: "G", v: 0, g: 0, a: 0, t: "azul" },
        { n: "Pedro", p: "A", v: 0, g: 0, a: 0, t: "azul" },
        { n: "Mateus", p: "A", v: 0, g: 0, a: 0, t: "azul" },
        { n: "Carlos", p: "A", v: 0, g: 0, a: 0, t: "azul" },
        { n: "Daniel", p: "A", v: 0, g: 0, a: 0, t: "azul" },
        { n: "Ricardo", p: "G", v: 0, g: 0, a: 0, t: "red" },
        { n: "Silva", p: "A", v: 0, g: 0, a: 0, t: "red" },
        { n: "André", p: "A", v: 0, g: 0, a: 0, t: "red" },
        { n: "Roberto", p: "A", v: 0, g: 0, a: 0, t: "red" },
        { n: "Felipe", p: "A", v: 0, g: 0, a: 0, t: "red" }
    ];
    let fila = ["Gustavo", "Bruno", "Vinícius", "Henrique", "Fábio", "Tiago", "Leo", "Beto"];
    let sAzul = 0, sRed = 0, segs = 600, tId = null, autor = null;

    function render() {
        const field = document.getElementById('field');
        const times = ['azul', 'red'];
        field.innerHTML = times.map(time => `
            <div class="team-card">
                <div class="t-header" style="background:var(--${time === 'azul' ? 'blue' : 'red'})">TIME ${time.toUpperCase()}</div>
                ${atletas.filter(a => a.t === time).map(a => `
                    <div class="row">
                        <span><b>${a.p}</b> ${a.n}</span>
                        <button class="btn-gol" onclick="abr('${a.n}', '${time}')">GOL</button>
                    </div>
                `).join('')}
            </div>
        `).join('');
        
        const sorted = [...atletas].sort((a,b) => (b.g + b.a) - (a.g + a.a));
        document.getElementById('r-body').innerHTML = sorted.map(a => `<tr><td>${a.n}</td><td>${a.v}</td><td>${a.g}</td><td>${a.a}</td></tr>`).join('');
        
        // Organiza fila por times de 5
        let filaTexto = "";
        for (let i = 0; i < fila.length; i += 5) {
            filaTexto += `TIME ${Math.floor(i/5) + 1}: [${fila.slice(i, i+5).join(", ")}]<br>`;
        }
        document.getElementById('fila-lista').innerHTML = filaTexto || "Fila vazia";
    }

    function abr(n, t) {
        autor = n;
        const opts = document.getElementById('opts');
        opts.innerHTML = atletas.filter(a => a.t === t && a.n !== n).map(c => `<button class="opt" onclick="gol('${c.n}')">${c.n}</button>`).join('');
        document.getElementById('modal').style.display = 'flex';
    }

    function gol(assist) {
        let aObj = atletas.find(x => x.n === autor);
        aObj.g++;
        if(assist) atletas.find(x => x.n === assist).a++;
        if(aObj.t === 'azul') sAzul++; else sRed++;
        
        document.getElementById('s-azul').innerText = sAzul;
        document.getElementById('s-red').innerText = sRed;
        document.getElementById('modal').style.display = 'none';
        
        const log = document.getElementById(`l-${aObj.t}`);
        log.innerHTML = `<div class="log-item"><b>${autor}</b> ${assist ? '(👟 '+assist+')' : ''}</div>` + log.innerHTML;
        render();
    }

    function editarFila() {
        let nova = prompt("Edite a fila (separe nomes por vírgula):", fila.join(", "));
        if (nova !== null) {
            fila = nova.split(",").map(x => x.trim()).filter(x => x !== "");
            render();
        }
    }

    function startT() { if(!tId) tId = setInterval(() => { if(segs>0) { segs--; updT(); } }, 1000); }
    function pauseT() { clearInterval(tId); tId = null; }
    function resetT() { pauseT(); segs = 600; updT(); }
    function updT() {
        let m = Math.floor(segs/60), s = segs%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
    }

    function fim(res) { alert("Partida Finalizada: " + res); location.reload(); }

    render();
</script>
</body>
</html>
