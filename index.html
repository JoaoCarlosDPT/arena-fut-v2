<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Fut PRO FINAL</title>

<style>
/* --- SEU CSS ORIGINAL MANTIDO 100% --- */
:root { --neon: #00ff88; --dark: #000; --card: #1a1a1a; --border: #333; --blue: #007bff; --red: #dc3545; --gold: #ffcc00; }

body { background: var(--dark); color: #fff; font-family: 'Segoe UI'; padding: 10px; margin: 0; }

.card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
button { border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
.btn-neon { background: var(--neon); color: #000; padding: 15px; width: 100%; }

.hidden { display: none; }
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="tela1">
    <div class="card">
        <h2>CRIAR PELADA</h2>
        <input id="nomeEvento" placeholder="Nome"><br><br>
        <input id="limite" type="number" placeholder="Limite"><br><br>
        <button class="btn-neon" onclick="irTela2()">PRÓXIMO</button>
    </div>
</div>

<!-- TELA 2 -->
<div id="tela2" class="hidden">
    <div class="card">
        <textarea id="listaTexto" placeholder="Lista jogadores"></textarea>
        <button class="btn-neon" onclick="processarLista()">PROCESSAR</button>
    </div>

    <div id="lista"></div>

    <button class="btn-neon" onclick="irParaJogo()">INICIAR PARTIDA</button>
</div>

<!-- TELA 3 -->
<div id="tela3" class="hidden">

    <h2>JOGO</h2>

    <div>
        <h3>AZUL</h3>
        <div id="timeAzul"></div>
    </div>

    <div>
        <h3>VERMELHO</h3>
        <div id="timeRed"></div>
    </div>

    <h3>FILA</h3>
    <div id="fila"></div>

</div>

<script>

/* =========================
   ESTADO GLOBAL
========================= */

let appState = {
    atletas: [],
    confirmados: [],
    times: { azul: [], red: [] },
    fila: []
};

/* =========================
   TELA 1 → 2
========================= */

function irTela2(){
    document.getElementById('tela1').classList.add('hidden');
    document.getElementById('tela2').classList.remove('hidden');
}

/* =========================
   PROCESSAR LISTA
========================= */

function processarLista(){
    let texto = document.getElementById('listaTexto').value.split('\n');

    appState.atletas = texto.map((nome, i) => ({
        id: i,
        nome: nome.trim(),
        confirmado: true
    }));

    renderLista();
}

function renderLista(){
    let html = "";

    appState.atletas.forEach(a=>{
        html += `
            <div>
                <input type="checkbox" checked onchange="toggle(${a.id})">
                ${a.nome}
            </div>
        `;
    });

    document.getElementById('lista').innerHTML = html;
}

function toggle(id){
    let a = appState.atletas.find(x=>x.id==id);
    a.confirmado = !a.confirmado;
}

/* =========================
   INICIAR JOGO
========================= */

function irParaJogo(){

    appState.confirmados = appState.atletas.filter(a=>a.confirmado);

    let jogadores = [...appState.confirmados].sort(()=>Math.random()-0.5);

    appState.times.azul = jogadores.slice(0,5);
    appState.times.red = jogadores.slice(5,10);
    appState.fila = jogadores.slice(10);

    document.getElementById('tela2').classList.add('hidden');
    document.getElementById('tela3').classList.remove('hidden');

    renderJogo();
}

/* =========================
   RENDER JOGO
========================= */

function renderJogo(){

    document.getElementById('timeAzul').innerHTML =
        appState.times.azul.map(a=>`<div>${a.nome}</div>`).join('');

    document.getElementById('timeRed').innerHTML =
        appState.times.red.map(a=>`<div>${a.nome}</div>`).join('');

    document.getElementById('fila').innerHTML =
        appState.fila.map(a=>`<div>${a.nome}</div>`).join('');
}

</script>

</body>
</html>
