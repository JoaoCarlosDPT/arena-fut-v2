<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO - Teste Funcional</title>
    <style>
        :root {
            --bg-body: #0c0e11;
            --bg-card: #15181d;
            --blue: #007bff;
            --red: #dc3545;
            --neon-green: #00ff88;
            --gold: #ffcc00;
            --text-muted: #888;
            --border: #222;
        }

        body {
            background: var(--bg-body);
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        #app-container {
            width: 100%; max-width: 400px;
            background: linear-gradient(180deg, #1a1d21 0%, #0c0e11 100%);
            min-height: 95vh; border-radius: 35px; padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        /* TIMER & PLACAR */
        .timer-section { text-align: center; margin-bottom: 20px; }
        .clock {
            font-size: 75px; font-weight: bold; color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.4); margin: 5px 0;
        }
        .timer-btns { display: flex; justify-content: center; gap: 15px; }
        .btn-circle {
            background: #222; border: 1px solid #333; color: #fff;
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
        }

        .p-bar-container { width: 100%; height: 8px; background: #111; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 1px solid #222; }
        .p-bar-fill { height: 100%; width: 100%; background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); transition: 1s linear; }

        .scoreboard { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; }
        .score-box {
            width: 85px; height: 85px; border-radius: 15px; background: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; font-weight: bold; border: 2px solid transparent;
        }
        .score-box.azul { color: var(--blue); border-color: var(--blue); text-shadow: 0 0 15px var(--blue); }
        .score-box.red { color: var(--red); border-color: var(--red); text-shadow: 0 0 15px var(--red); }

        /* FIELD PANEL */
        .field-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .team-card { background: var(--bg-card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
        .team-header { padding: 10px; text-align: center; font-size: 11px; font-weight: 900; color: #fff; }
        .header-azul { background: var(--blue); }
        .header-red { background: var(--red); }

        .player-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; border-bottom: 1px solid #1e2126; font-size: 12px;
        }
        .p-pos { color: var(--gold); font-weight: bold; margin-right: 4px; }
        .btn-gol {
            background: #111; border: 1px solid var(--neon-green); color: var(--neon-green);
            font-size: 9px; font-weight: bold; padding: 4px 8px; border-radius: 5px;
        }
        .btn-swap { background: transparent; border: none; color: #fff; cursor: pointer; font-size: 14px; }

        /* TIMELINE */
        .timeline {
            background: var(--bg-card); border-radius: 14px; border: 1px solid var(--border);
            padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
            min-height: 80px;
        }
        .log-title { font-size: 10px; font-weight: 900; color: #444; text-align: center; margin-bottom: 10px; }
        .log-entry { font-size: 11px; color: #aaa; margin-bottom: 5px; line-height: 1.3; }
        .log-entry b { color: #fff; }

        /* FILA & FOOTER */
        .fila-card {
            background: rgba(0, 255, 136, 0.05); border: 2px solid var(--neon-green);
            border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .fila-card h4 { color: var(--neon-green); margin: 0; font-size: 12px; }
        .fila-card p { margin: 5px 0 0; font-size: 10px; color: #777; }

        .add-atrasado { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-atrasado input { flex: 1; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; padding: 8px; font-size: 12px; }

        .outcome-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-outcome {
            background: var(--bg-card); border: 1px solid var(--border); color: #fff;
            padding: 12px 5px; border-radius: 10px; font-weight: bold; font-size: 10px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="timer-section">
        <div class="clock" id="display-time">10:00</div>
        <div class="timer-btns">
            <button class="btn-circle" onclick="startTimer()">▶</button>
            <button class="btn-circle" onclick="pauseTimer()">Ⅱ</button>
            <button class="btn-circle" onclick="resetTimer()">↺</button>
        </div>
        <div class="p-bar-container"><div class="p-bar-fill" id="timer-bar"></div></div>
    </div>

    <div class="scoreboard">
        <div class="score-box azul" id="score-azul">0</div>
        <div class="score-box red" id="score-red">0</div>
    </div>

    <div style="font-size: 10px; color: #555; font-weight: 900; margin-bottom: 8px;">FIELD PANEL</div>
    <div class="field-panel">
        <div class="team-card">
            <div class="team-header header-azul">TIME AZUL</div>
            <div id="players-azul"></div>
        </div>
        <div class="team-card">
            <div class="team-header header-red">TIME RED</div>
            <div id="players-red"></div>
        </div>
    </div>

    <div style="font-size: 10px; color: #555; font-weight: 900; margin-bottom: 8px;">TIMELINE / LOG</div>
    <div class="timeline">
        <div><div class="log-title">AZUL LOG</div><div id="log-azul"></div></div>
        <div><div class="log-title">RED LOG</div><div id="log-red"></div></div>
    </div>

    <div class="fila-card">
        <div>
            <h4>PRÓXIMO TIME (FILA)</h4>
            <p id="txt-fila">Ninguém na espera</p>
        </div>
        <button style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:8px; font-size:10px;">EDITAR</button>
    </div>

    <div class="add-atrasado">
        <input type="text" id="input-atrasado" placeholder="Nome do atrasado...">
        <button onclick="adicionarAtrasado()" style="background:var(--neon-green); border:none; color:#000; font-weight:bold; padding:0 15px; border-radius:8px;">+</button>
    </div>

    <div class="outcome-row">
        <button class="btn-outcome" style="border-color: var(--blue); color: var(--blue);" onclick="fimJogo('Azul')">VITÓRIA AZUL</button>
        <button class="btn-outcome" style="border-color: var(--red); color: var(--red);" onclick="fimJogo('Red')">VITÓRIA RED</button>
        <button class="btn-outcome" onclick="fimJogo('Empate')">EMPATE</button>
    </div>
</div>

<script>
    // --- DADOS FICTÍCIOS DAS TELAS 1 E 2 ---
    let tempoOriginal = 10; 
    let segundosRestantes = tempoOriginal * 60;
    let timerId = null;
    let placar = { azul: 0, red: 0 };

    let atletasEmCampo = {
        azul: [
            { id: 1, nome: "Lucas", pos: "G" },
            { id: 2, nome: "Pedro", pos: "A" },
            { id: 3, nome: "Mateus", pos: "A" },
            { id: 4, nome: "Carlos", pos: "A" },
            { id: 5, nome: "Daniel", pos: "A" }
        ],
        red: [
            { id: 6, nome: "Ricardo", pos: "G" },
            { id: 7, nome: "Silva", pos: "A" },
            { id: 8, nome: "André", pos: "A" },
            { id: 9, nome: "Roberto", pos: "A" },
            { id: 10, nome: "Felipe", pos: "A" }
        ]
    };

    let filaEspera = ["Gustavo", "Bruno", "Vinícius", "Henrique", "Fábio"];

    // --- FUNCIONALIDADES ---

    function renderizarTudo() {
        renderTime('azul');
        renderTime('red');
        document.getElementById('txt-fila').innerText = "PRÓXIMOS: [" + filaEspera.join(", ") + "]";
    }

    function renderTime(time) {
        const container = document.getElementById(`players-${time}`);
        container.innerHTML = atletasEmCampo[time].map(p => `
            <div class="player-row">
                <span><span class="p-pos">${p.pos}</span> ${p.nome}</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn-gol" onclick="marcarGol('${time}', '${p.nome}')">GOL</button>
                    <button class="btn-swap" onclick="substituir('${time}', ${p.id})">🔄</button>
                </div>
            </div>
        `).join('');
    }

    function marcarGol(time, nome) {
        placar[time]++;
        document.getElementById(`score-${time}`).innerText = placar[time];
        const log = document.getElementById(`log-${time}`);
        const min = Math.floor((tempoOriginal * 60 - segundosRestantes) / 60);
        log.innerHTML = `<div class="log-entry">[${min}'] ⚽ <b>${nome}</b></div>` + log.innerHTML;
    }

    function substituir(time, idSaindo) {
        if (filaEspera.length === 0) return alert("Fila vazia!");
        const saindo = atletasEmCampo[time].find(p => p.id === idSaindo);
        const proximo = filaEspera.shift();
        
        const log = document.getElementById(`log-${time}`);
        log.innerHTML = `<div class="log-entry">🔄 Sai: ${saindo.nome} / Entra: ${proximo}</div>` + log.innerHTML;
        
        saindo.nome = proximo; // Simples troca de nome para o teste
        renderizarTudo();
    }

    function adicionarAtrasado() {
        const input = document.getElementById('input-atrasado');
        if (input.value) {
            filaEspera.push(input.value);
            input.value = "";
            renderizarTudo();
        }
    }

    // --- CRONÔMETRO ---
    function startTimer() {
        if (timerId) return;
        timerId = setInterval(() => {
            segundosRestantes--;
            if (segundosRestantes <= 0) {
                clearInterval(timerId);
                alert("FIM DE JOGO!");
            }
            atualizarRelogio();
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerId);
        timerId = null;
    }

    function resetTimer() {
        pauseTimer();
        segundosRestantes = tempoOriginal * 60;
        atualizarRelogio();
    }

    function atualizarRelogio() {
        const m = Math.floor(segundosRestantes / 60);
        const s = segundosRestantes % 60;
        document.getElementById('display-time').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        const perc = (segundosRestantes / (tempoOriginal * 60)) * 100;
        document.getElementById('timer-bar').style.width = perc + "%";
    }

    function fimJogo(res) {
        alert("Resultado final registrado: " + res);
        location.reload(); // Reinicia para novo teste
    }

    // Iniciar
    renderizarTudo();
</script>
</body>
</html>
