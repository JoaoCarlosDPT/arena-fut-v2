<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Fut PRO - Full Responsive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --blue: #007bff; --red: #dc3545; --neon: #00ff88; --gold: #ffcc00; --bg: #0c0e11; --card: #15181d; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        #app { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 15px; }

        /* HEADER & SCORE */
        .top-grid { display: flex; flex-wrap: wrap; justify-content: space-around; align-items: center; gap: 20px; }
        .clock { font-size: 60px; color: var(--gold); font-weight: bold; text-shadow: 0 0 20px rgba(255,204,0,0.3); }
        .score-display { display: flex; gap: 15px; }
        .s-box { width: 70px; height: 70px; background: #000; border: 2px solid; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; }

        /* FIELD PANEL RESPONSIVO */
        .field-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .team-card { flex: 1; min-width: 280px; background: var(--card); border-radius: 15px; border: 1px solid #222; overflow: hidden; }
        .t-header { padding: 10px; font-weight: 900; text-align: center; text-transform: uppercase; font-size: 12px; }
        .player-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        
        /* FILA NEON */
        .fila-section { border: 2px solid var(--neon); border-radius: 15px; padding: 15px; background: rgba(0,255,136,0.02); }
        .fila-list-ui { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .atleta-tag { background: #222; padding: 5px 10px; border-radius: 5px; font-size: 10px; border: 1px solid #333; }

        /* RANKING */
        .ranking-container { overflow-x: auto; background: var(--card); border-radius: 15px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #555; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; }

        /* MODAIS */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
        .m-content { background: var(--card); width:100%; max-width: 400px; padding:20px; border-radius:20px; border: 1px solid var(--neon); max-height: 80vh; overflow-y: auto; }
        .sortable-item { background: #222; padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: grab; display: flex; justify-content: space-between; }

        /* BUTTONS */
        .btn-main { background: var(--card); border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; flex: 1; }
        .action-bar { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div class="top-grid">
        <div class="clock" id="timer">10:00</div>
        <div class="score-display">
            <div class="s-box" style="border-color:var(--blue); color:var(--blue)" id="s-azul">0</div>
            <div class="s-box" style="border-color:var(--red); color:var(--red)" id="s-red">0</div>
        </div>
    </div>

    <div class="field-grid" id="field"></div>

    <div class="fila-section">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="color:var(--neon); font-weight:900">PRÓXIMOS TIMES</span>
            <button onclick="abrirModalFila()" style="background:none; border:1px solid var(--gold); color:var(--gold); border-radius:5px; padding:5px 10px; font-size:10px; cursor:pointer">EDITAR FILA 🖊️</button>
        </div>
        <div class="fila-list-ui" id="fila-tags"></div>
    </div>

    <div class="ranking-container">
        <table>
            <thead><tr><th>ATLETA</th><th>V</th><th>G</th><th>A</th></tr></thead>
            <tbody id="ranking-body"></tbody>
        </table>
    </div>

    <div class="action-bar">
        <button class="btn-main" style="border-color:var(--blue); color:var(--blue)" onclick="proximaPartida('azul')">VITÓRIA AZUL</button>
        <button class="btn-main" style="border-color:var(--red); color:var(--red)" onclick="proximaPartida('red')">VITÓRIA RED</button>
        <button class="btn-main" onclick="proximaPartida('empate')">EMPATE</button>
    </div>
</div>

<div id="modalFila" class="modal">
    <div class="m-content">
        <h3 style="text-align:center; color:var(--neon)">Reordenar Fila</h3>
        <p style="font-size:10px; color:#666; text-align:center">Arraste para mudar a posição</p>
        <div id="sortable-list"></div>
        <button onclick="salvarFila()" style="width:100%; padding:15px; background:var(--neon); border:none; border-radius:10px; font-weight:bold; margin-top:15px">SALVAR ORDEM</button>
    </div>
</div>

<script>
    // ESTADO INICIAL (TELAS 1 E 2)
    let timeAzul = ["Lucas (G)", "Pedro", "Mateus", "Carlos", "Daniel"];
    let timeRed = ["Ricardo (G)", "Silva", "André", "Roberto", "Felipe"];
    let fila = ["Gustavo", "Bruno", "Vinícius", "Henrique", "Fábio", "Tiago", "Leo", "Beto", "João", "Zeca"];
    let stats = {}; // Para o ranking

    function render() {
        // Renderiza Campo
        const field = document.getElementById('field');
        field.innerHTML = `
            <div class="team-card"><div class="t-header" style="background:var(--blue)">TIME AZUL</div>
                ${timeAzul.map(n => `<div class="player-row"><span>${n}</span><button style="color:var(--neon); background:none; border:none">GOL</button></div>`).join('')}
            </div>
            <div class="team-card"><div class="t-header" style="background:var(--red)">TIME RED</div>
                ${timeRed.map(n => `<div class="player-row"><span>${n}</span><button style="color:var(--neon); background:none; border:none">GOL</button></div>`).join('')}
            </div>
        `;

        // Renderiza Fila Tags
        document.getElementById('fila-tags').innerHTML = fila.map(n => `<span class="atleta-tag">${n}</span>`).join('');

        // Ranking (Simulado)
        const rb = document.getElementById('ranking-body');
        rb.innerHTML = [...timeAzul, ...timeRed].map(n => `<tr><td>${n}</td><td>0</td><td>0</td><td>0</td></tr>`).join('');
    }

    // LÓGICA DE GIRO DE TIMES
    function proximaPartida(resultado) {
        if (fila.length < 5) { alert("Fila insuficiente para montar novo time!"); return; }

        if (resultado === 'azul') {
            fila.push(...timeRed); // Perdedor vai pra fila
            timeRed = fila.splice(0, 5); // Próximos 5 entram
        } else if (resultado === 'red') {
            fila.push(...timeAzul);
            timeAzul = fila.splice(0, 5);
        } else {
            // Empate: Ambos saem ou regra da casa (aqui ambos saem)
            fila.push(...timeAzul, ...timeRed);
            timeAzul = fila.splice(0, 5);
            timeRed = fila.splice(0, 5);
        }
        
        document.getElementById('s-azul').innerText = "0";
        document.getElementById('s-red').innerText = "0";
        render();
    }

    // MODAL E DRAG & DROP
    function abrirModalFila() {
        const list = document.getElementById('sortable-list');
        list.innerHTML = fila.map(n => `<div class="sortable-item" data-name="${n}">${n} <span>☰</span></div>`).join('');
        
        new Sortable(list, { animation: 150 });
        document.getElementById('modalFila').style.display = 'flex';
    }

    function salvarFila() {
        const items = document.querySelectorAll('.sortable-item');
        fila = Array.from(items).map(el => el.getAttribute('data-name'));
        document.getElementById('modalFila').style.display = 'none';
        render();
    }

    render();
</script>
</body>
</html>
