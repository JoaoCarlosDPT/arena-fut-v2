<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Fut PRO - Sistema Completo</title>
    <style>
        :root { --blue: #007bff; --red: #dc3545; --neon: #00ff88; --gold: #ffcc00; --bg: #0c0e11; --card: #15181d; --border: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        #app { width: 100%; max-width: 420px; }
        
        .screen { display: none; flex-direction: column; gap: 12px; }
        .screen.active { display: flex; }

        /* ESTILOS COMUNS */
        .card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
        button { border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-neon { background: var(--neon); color: #000; padding: 15px; width: 100%; font-size: 1rem; }
        .btn-finalizar { background: var(--gold); color: #000; padding: 15px; border-radius: 15px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%; }
        
        /* HEADER NAV */
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-nav { background: #222; border: 1px solid #444; color: #fff; padding: 5px 15px; border-radius: 10px; cursor: pointer; font-size: 12px; }

        /* TIMER & SCORE */
        .clock { font-size: clamp(50px, 15vw, 65px); color: var(--gold); font-weight: bold; text-align: center; margin: 5px 0; }
        .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .score-box { width: 75px; height: 75px; background: #000; border: 2px solid; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: bold; }

        /* FIELD */
        .field { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .team-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .t-header { padding: 8px; font-size: 10px; font-weight: 900; text-align: center; text-transform: uppercase; }
        .row-player { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #1c1f24; font-size: 11px; }
        .btn-gol { background: #111; border: 1px solid var(--neon); color: var(--neon); font-size: 9px; padding: 4px 7px; border-radius: 5px; font-weight: bold; }

        /* RANKING */
        .ranking-table { width: 100%; border-collapse: collapse; background: var(--card); font-size: 11px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-top: 10px; }
        .ranking-table th { background: #222; padding: 8px; color: #666; text-align: left; }
        .ranking-table td { padding: 8px; border-bottom: 1px solid #222; }

        /* MODAIS */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; align-items:center; justify-content:center; z-index:999; }
        .m-content { background: var(--card); width:90%; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-1" class="screen active">
        <div class="card">
            <h3 style="color:var(--neon)">Configurar Pelada</h3>
            <input type="text" id="nomeEvento" placeholder="Nome da Pelada" style="width:100%; padding:10px; margin-bottom:10px; background:#111; color:#fff; border-radius:10px;">
            <button class="btn-neon" onclick="irParaTela(2)">PRÓXIMO</button>
        </div>
    </div>

    <div id="screen-2" class="screen">
        <div class="header-nav">
            <button class="btn-nav" onclick="irParaTela(1)">← VOLTAR</button>
            <span style="font-weight:bold">CONVOCADOS</span>
        </div>
        <textarea id="listaTexto" rows="5" placeholder="Cole os nomes dos atletas aqui..." style="width:100%; padding:10px; background:#111; color:#fff; border-radius:10px;"></textarea>
        <button class="btn-neon" onclick="iniciarPartida()">INICIAR PARTIDA</button>
    </div>

    <div id="screen-3" class="screen">
        <div class="header-nav">
            <button class="btn-nav" onclick="irParaTela(2)">← VOLTAR</button>
            <span style="font-weight:bold; color:var(--gold)">JOGO ATUAL</span>
            <div style="width: 50px;"></div>
        </div>

        <div class="clock" id="timer">10:00</div>
        
        <div class="scoreboard">
            <div class="score-box" style="border-color:var(--blue); color:var(--blue)" id="s-azul">0</div>
            <div class="score-box" style="border-color:var(--red); color:var(--red)" id="s-red">0</div>
        </div>

        <div class="field" id="field"></div>
        
        <button class="btn-finalizar" onclick="irParaTela(4)">FINALIZAR PELADA</button>

        <table class="ranking-table">
            <thead><tr><th>ATLETA</th><th>V</th><th>G</th><th>A</th></tr></thead>
            <tbody id="r-body"></tbody>
        </table>
    </div>

    <div id="screen-4" class="screen">
        <h2 style="text-align:center; color:var(--gold)">RESUMO FINAL</h2>
        <table class="ranking-table">
            <thead><tr><th>ATLETA</th><th>V</th><th>G</th><th>A</th></tr></thead>
            <tbody id="r-body-final"></tbody>
        </table>
        <button class="btn-finalizar" onclick="irParaTela(3)">VOLTAR AO JOGO</button>
    </div>
</div>

<div id="modal-assist" class="modal">
    <div class="m-content">
        <h4 style="text-align:center">Quem deu o passe? 👟</h4>
        <div id="opts"></div>
        <button onclick="gol(null)" style="width:100%; padding:15px; margin-top:10px;">GOL INDIVIDUAL</button>
    </div>
</div>

<script>
    let atletas = [];
    let sAzul = 0, sRed = 0, autor = null;

    function irParaTela(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + n).classList.add('active');
        render();
    }

    function iniciarPartida() {
        const texto = document.getElementById('listaTexto').value;
        const nomes = texto.split('\n').filter(l => l.trim() !== '');
        
        // Populando atletas iniciais
        atletas = nomes.map((n, i) => ({ 
            n: n.trim(), v: 0, g: 0, a: 0, 
            t: i < (nomes.length/2) ? 'azul' : 'red', 
            active: true 
        }));
        
        irParaTela(3);
    }

    function processarFim(resultado) {
        if (resultado === 'azul') atletas.filter(a => a.t === 'azul' && a.active).forEach(a => a.v++);
        else if (resultado === 'red') atletas.filter(a => a.t === 'red' && a.active).forEach(a => a.v++);
        
        // Reset simples de placar para nova partida
        sAzul=0; sRed=0;
        document.getElementById('s-azul').innerText=0; document.getElementById('s-red').innerText=0;
        render();
    }

    function render() {
        // Render Campo
        const field = document.getElementById('field');
        field.innerHTML = `
            <div class="team-card"><div class="t-header" style="background:var(--blue)">AZUL</div>${atletas.filter(a => a.t === 'azul' && a.active).map(a => `<div class="row-player"><span>${a.n}</span><button class="btn-gol" onclick="abrAssist('${a.n}', 'azul')">GOL</button></div>`).join('')}</div>
            <div class="team-card"><div class="t-header" style="background:var(--red)">RED</div>${atletas.filter(a => a.t === 'red' && a.active).map(a => `<div class="row-player"><span>${a.n}</span><button class="btn-gol" onclick="abrAssist('${a.n}', 'red')">GOL</button></div>`).join('')}</div>
        `;
        
        // Render Ranking (V > G > A)
        const sorted = [...atletas].sort((a,b) => (b.v - a.v) || (b.g - a.g) || (b.a - a.a));
        const htmlRanking = sorted.map(a => `<tr><td>${a.n}</td><td>${a.v}</td><td>${a.g}</td><td>${a.a}</td></tr>`).join('');
        document.getElementById('r-body').innerHTML = htmlRanking;
        document.getElementById('r-body-final').innerHTML = htmlRanking;
    }

    function abrAssist(n, t) { 
        autor = n; 
        const opts = document.getElementById('opts'); 
        opts.innerHTML = atletas.filter(a => a.t === t && a.active && a.n !== n).map(c => `<button onclick="gol('${c.n}')" style="width:100%; margin:5px 0; padding:10px;">${c.n}</button>`).join(''); 
        document.getElementById('modal-assist').style.display = 'flex'; 
    }

    function gol(assist) {
        let aObj = atletas.find(x => x.n === autor);
        aObj.g++; if(assist) atletas.find(x => x.n === assist).a++;
        aObj.t === 'azul' ? sAzul++ : sRed++;
        document.getElementById('s-azul').innerText = sAzul; document.getElementById('s-red').innerText = sRed;
        document.getElementById('modal-assist').style.display = 'none';
        render();
    }
</script>
</body>
</html>
